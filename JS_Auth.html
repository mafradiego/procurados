<script>
/* ================================================================
     MÓDULO 1: VARIÁVEIS GLOBAIS E ESTADO
     ================================================================ */
  let mapaPrincipal;
  let dadosMandados = [];
  let listaMarcadores = [];
  let infoWindowAtiva = null;
  let usuarioLogado = null;
  let perfilUsuario = '';
  let dadosTemporariosCadastro = null;
  let pinosPreview = [];
  let fotoBase64Temporaria = null;
  let posicaoPatrulheiro = null;
  let watchPositionId = null;
  let configsSistema = {};
  let secundariosVisiveis = {}; // { mandado: { markers: [], polylines: [] } }
  let lastPendingCount = 0; // Para notificar novos cadastros
  let _gpsResolvido = false; // Indica se o GPS já respondeu (sucesso ou falha)
  let _dadosCarregados = false; // Indica se os mandados já foram carregados do servidor
  let _semGpsJaExibiu = false; // Evita chamadas duplicadas de _tentarExibirSemGPS

  // RASTREADOR DE ATIVIDADE (Heartbeat Controlado)
  let timestampUltimaAtividade = Date.now();
  
  document.addEventListener('mousemove', () => { timestampUltimaAtividade = Date.now(); }, { passive: true });
  document.addEventListener('keydown', () => { timestampUltimaAtividade = Date.now(); }, { passive: true });
  document.addEventListener('touchstart', () => { timestampUltimaAtividade = Date.now(); }, { passive: true });
  
  setInterval(() => {
    if (usuarioLogado && usuarioLogado.autorizado) {
      // Se houve movimento na tela nos últimos 5 segundos
      if ((Date.now() - timestampUltimaAtividade) < 5000) {
        google.script.run.registrarHeartbeat();
      }
    }
  }, 5000);

  /* ================================================================
     MÓDULO 2: AUTENTICAÇÃO E INICIALIZAÇÃO
     ================================================================ */
  function iniciarMapa() {
    const lblStatus = document.getElementById("txt-status-carregamento");
    if (lblStatus) lblStatus.innerText = "VERIFICANDO CREDENCIAIS...";

    // Carregar configs primeiro, depois verificar acesso
    google.script.run.withSuccessHandler(function(configs) {
      configsSistema = configs;
      aplicarConfigsDinamicas(configs);
      if (lblStatus) lblStatus.innerText = "CREDENCIAIS VERIFICADAS. ENTRANDO NO SISTEMA...";
      google.script.run.withSuccessHandler(avaliarAcessoSistema).verificarAcessoUsuario();
    }).obterConfiguracoesSimples();
  }

  // Expõe iniciarMapa globalmente para o callback da API do Google Maps
  window.iniciarMapa = iniciarMapa;

  function avaliarAcessoSistema(resposta) {
    const boxCarregando = document.getElementById("seg-estado-carregando");
    const telaSeguranca = document.getElementById("tela-seguranca");
    const lblStatus = document.getElementById("txt-status-carregamento");

    if (resposta.autorizado) {
      if (lblStatus) lblStatus.innerText = "CARREGANDO OS MANDADOS E O MAPA...";
      usuarioLogado = resposta;
      perfilUsuario = resposta.perfil || '';

      // Atualizar sidebar
      document.getElementById('sidebarNomeEl').textContent = resposta.nome;
      document.getElementById('sidebarPerfilEl').textContent = resposta.perfil;
      if (resposta.fotoUrl) {
        document.getElementById('sidebarAvatarContainer').innerHTML =
          '<img src="' + resposta.fotoUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />';
        const hdrImg = document.getElementById('userPhotoHeader');
        if (hdrImg) { hdrImg.src = resposta.fotoUrl; hdrImg.style.display = 'block'; }
      }

      // Controle de Botões de Importar PDF (Admin ou Colaborador)
      const perfilNormalizado = (resposta.perfil || "").trim().toLowerCase();
      if (perfilNormalizado !== "patrulheiro") {
        const btnNovo = document.getElementById("btnAdminNovo");
        if (btnNovo) btnNovo.style.display = "flex";
        document.querySelectorAll('.btn-importar-pdf-desktop').forEach(function(el) {
          el.style.display = 'flex';
        });
      } else {
        document.querySelectorAll('.btn-importar-pdf-desktop').forEach(function(el) {
          el.style.display = 'none';
        });
      }

      // Controle de visibilidade do Ranking
      const gamifAtiva = configsSistema['gamif_ativo'] === 'SIM' || configsSistema['gamif_ativo'] === true || configsSistema['gamif_ativo'] === 'true';
      const rankingPublico = configsSistema['ranking_publico'] === 'SIM' || configsSistema['ranking_publico'] === true || configsSistema['ranking_publico'] === 'true';
      
      const btnRanking = document.getElementById("nav-btn-ranking");
      if (btnRanking) {
        if (!gamifAtiva) {
          btnRanking.style.display = 'none';
        } else {
          if (perfilNormalizado === "patrulheiro" && !rankingPublico) {
            btnRanking.style.display = 'none';
          } else {
            btnRanking.style.display = 'flex';
          }
        }
      }

      if (perfilNormalizado === "admin") {
        const btnMenu = document.getElementById("btnMenuAdmin");
        const btnAjustes = document.getElementById("btnMenuAjustes");
        const btnConferencia = document.getElementById("btnMenuConferencia");
        const btnAuditoria   = document.getElementById("btnMenuAuditoria");
        if (btnMenu) btnMenu.style.display = "block";
        if (btnAjustes) btnAjustes.style.display = "block";
        if (btnConferencia) btnConferencia.style.display = "block";
        if (btnAuditoria)   btnAuditoria.style.display   = "block";

        // Badge auditoria: carregar em background após dados prontos (4s)
        setTimeout(function() { if (typeof carregarAuditoria === 'function') carregarAuditoria(); }, 4000);

        // Polling para novos cadastros (a cada 2 min)
        setInterval(function() {
          google.script.run.withSuccessHandler(function(usuarios) {
            if (!usuarios) return;
            const pendentesAtual = usuarios.filter(function(u) { return u.status === 'PENDENTE'; }).length;
            if (pendentesAtual > lastPendingCount) {
              const diferenca = pendentesAtual - lastPendingCount;
              chamarAlertaTatico("NOVO CADASTRO", diferenca + " novo(s) operador(es) pendente(s) aguardando aprovação.", "OK", function() {
                mostrarView('view-usuarios');
                carregarListaUsuarios();
              });
            }
            lastPendingCount = pendentesAtual;
            const badge = document.getElementById('badgeUsuariosPendentes');
            if (badge) {
              if (pendentesAtual > 0) { badge.textContent = pendentesAtual; badge.style.display = 'inline-block'; }
              else { badge.style.display = 'none'; }
            }
          }).obterTodosUsuarios();
        }, 120000);
      }

      if (typeof mapaPrincipal === 'undefined' || !mapaPrincipal) {
        configurarEstruturaMapa();
      } else {
        // Mapa já existe, apenas sincronizar os dados
        const ts = document.getElementById("tela-seguranca");
        if (ts) {
          ts.style.opacity = "0";
          setTimeout(function() { ts.style.display = "none"; }, 500);
        }
        const iconeSinc = document.querySelector('button[title="Sincronizar"] span');
        if (iconeSinc) iconeSinc.style.animation = 'spin 1s linear infinite';
        google.script.run.withSuccessHandler(function(dados) {
          processarDados(dados);
          if (iconeSinc) iconeSinc.style.animation = 'none';
        }).obterDados();
      }
    }
    else if (resposta.status === "NAO_CADASTRADO") {
      if (boxCarregando) boxCarregando.style.display = "none";
      document.getElementById("lbl-email-google").innerText = resposta.email;
      document.getElementById("seg-estado-cadastro").style.display = "block";
    }
    else {
      if (boxCarregando) boxCarregando.style.display = "none";
      document.getElementById("msg-seg-titulo").innerText = resposta.status === "PENDENTE" ? "⏳ AGUARDANDO APROVAÇÃO" : "❌ ACESSO BLOQUEADO";
      document.getElementById("msg-seg-texto").innerText = resposta.motivo;
      document.getElementById("seg-estado-mensagem").style.display = "block";
    }
  }

  // Expõe avaliarAcessoSistema globalmente
  window.avaliarAcessoSistema = avaliarAcessoSistema;

  function reiniciarVerificacaoSeguranca() {

    document.getElementById("seg-estado-mensagem").style.display = "none";
    document.getElementById("seg-estado-cadastro").style.display = "none";
    document.getElementById("seg-estado-carregando").style.display = "block";
    document.getElementById("tela-seguranca").style.display = "flex";
    google.script.run.withSuccessHandler(avaliarAcessoSistema)
      .withFailureHandler(function(erro) {
        chamarAlertaTatico("ERRO", "Não foi possível contactar o servidor: " + erro.message, "OK");
        document.getElementById("seg-estado-carregando").style.display = "none";
        document.getElementById("seg-estado-mensagem").style.display = "block";
      }).verificarAcessoUsuario();
  }

  /* ================================================================
     MÓDULO 7: OPERAÇÕES DE REDE E CADASTRO
     ================================================================ */
  function chamarAlertaTatico(titulo, mensagem, tipo, callback) {
    const modal = document.getElementById("modalAlertaTatico");
    document.getElementById("alerta-titulo").innerText = titulo;
    document.getElementById("alerta-mensagem").innerHTML = mensagem;
    const containerBotoes = document.getElementById("alerta-botoes");
    containerBotoes.innerHTML = "";
    const alertBox = modal.querySelector(".alert-modal-box");

    if (tipo === "CONFIRMAR") {
      if (alertBox) alertBox.style.borderTopColor = "var(--warning)";
      const btnSim = document.createElement("button"); btnSim.className = "btn-alerta-sim";
      btnSim.innerText = "SIM, CONFIRMAR";
      btnSim.onclick = function() { modal.style.display = "none"; if(callback) callback(true); };
      const btnNao = document.createElement("button"); btnNao.className = "btn-alerta-nao";
      btnNao.innerText = "NÃO, CANCELAR";
      btnNao.onclick = function() { modal.style.display = "none"; if(callback) callback(false); };
      containerBotoes.appendChild(btnSim); containerBotoes.appendChild(btnNao);
    } else {
      if (alertBox) alertBox.style.borderTopColor = "var(--accent)";
      const btnOk = document.createElement("button"); btnOk.className = "btn-alerta-ok";
      btnOk.innerText = "CIENTE";
      btnOk.onclick = function() { modal.style.display = "none"; if(callback) callback(); };
      containerBotoes.appendChild(btnOk);
    }
    modal.style.display = "flex";
  }

  function enviarAtualizacao(mandado, btnElement) {
    const originalText = btnElement.innerText;
    const originalBg = btnElement.style.background || '';
    btnElement.innerHTML = '<span class="material-symbols-outlined" style="animation:spin 1s linear infinite;vertical-align:middle;font-size:14px;margin-right:4px;">sync</span> Sincronizando...';
    btnElement.disabled = true;
    const radios = document.getElementsByName("status_" + mandado);
    let novoStatus = "Procurado";
    for(let i=0;i<radios.length;i++) { if(radios[i].checked) { novoStatus = radios[i].value; break; } }
    const novaObs = document.getElementById("obs_" + mandado).value.trim();

    google.script.run
      .withSuccessHandler(function(res) {
        chamarAlertaTatico("ATUALIZAÇÃO", res.mensagem, "OK");
        
        btnElement.innerHTML = '✅ Concluído!';
        btnElement.style.background = 'var(--success)';
        const elObs = document.getElementById("obs_" + mandado);
        if (elObs) elObs.value = "";
        
        setTimeout(function() {
          btnElement.innerText = originalText;
          btnElement.style.background = originalBg;
          btnElement.disabled = false;
        }, 3000);
        
        const alvoLocal = dadosMandados.find(function(d) { return d.mandado === mandado; });
        if(alvoLocal) {
          alvoLocal.status = novoStatus;
          if (novaObs && novaObs.length > 0) {
             alvoLocal.observacoes = novaObs;
             const hoje = new Date();
             const dia = hoje.getDate().toString().padStart(2,'0');
             const mes = (hoje.getMonth()+1).toString().padStart(2,'0');
             const ano = hoje.getFullYear().toString().slice(-2);
             const hora = hoje.getHours().toString().padStart(2,'0');
             const min = hoje.getMinutes().toString().padStart(2,'0');
             const dataHoje = dia + '/' + mes + '/' + ano + ' - ' + hora + ':' + min;
             let usuario = (typeof usuarioLogado !== 'undefined' && usuarioLogado && usuarioLogado.nome) ? usuarioLogado.nome : 'Usuário';
             let objObs = { data: dataHoje, usuario: usuario, texto: novaObs };
             let hist = [];
             try { hist = JSON.parse(alvoLocal.historicoObservacoes || "[]"); } catch(e){}
             hist.push(objObs);
             alvoLocal.historicoObservacoes = JSON.stringify(hist);
             alvoLocal.observacoes = "";
          }
        }
        filtrarNoMapa();
      })
      .withFailureHandler(function(erro) {
        chamarAlertaTatico("ERRO NA ATUALIZAÇÃO", "Falha ao sincronizar: " + erro, "OK");
        btnElement.innerText = originalText;
        btnElement.style.background = originalBg;
        btnElement.disabled = false;
      })
      .atualizarRegistro(mandado, novoStatus, novaObs);
  }

  function salvarStatusBNMP(mandado, statusBnmp, btnElement) {
    let originalText = btnElement.innerText;
    btnElement.innerText = "⏳ Sincronizando..."; btnElement.disabled = true;

    google.script.run.withSuccessHandler(function(res) {
      chamarAlertaTatico("BNMP", res.mensagem, "OK");
      btnElement.innerText = "✅ " + statusBnmp;
      
      const alvoLocal = dadosMandados.find(function(d) { return d.mandado === mandado; });
      if(alvoLocal) {
        let dataHoje = new Date().toLocaleString('pt-BR');
        let usuario = (typeof usuarioLogado !== 'undefined' && usuarioLogado && usuarioLogado.nome) ? usuarioLogado.nome : 'Usuário';
        alvoLocal.bnmpConferencia = statusBnmp + " em " + dataHoje + " por " + usuario;
      }
    }).withFailureHandler(function(erro) {
      chamarAlertaTatico("ERRO BNMP", "Falha ao sincronizar: " + erro, "OK");
      btnElement.innerText = originalText; btnElement.disabled = false;
    }).salvarConferenciaBNMP(mandado, statusBnmp);
  }

  function verHistoricoObservacoes(mandado, btnElement) {
    console.log("verHistoricoObservacoes executada. mandado recebido:", mandado);
    try {
      console.log("Procurando mandado na lista dadosMandados...", dadosMandados);
      const alvoLocal = dadosMandados.find(function(d) { return d.mandado === mandado; });
      console.log("Resultado da busca pelo mandado:", alvoLocal);
      
      if (!alvoLocal) {
        chamarAlertaTatico("ERRO DE BUSCA", "Mandado " + mandado + " não encontrado na memória local.", "FECHAR");
        return;
      }
      
      if (!alvoLocal.historicoObservacoes) {
        chamarAlertaTatico("HISTÓRICO VAZIO", "Nenhuma observação registrada para este mandado.", "FECHAR");
        return;
      }

      let hist = [];
      try { 
        hist = JSON.parse(alvoLocal.historicoObservacoes || "[]"); 
      } catch(e){
         chamarAlertaTatico("ERRO DE PARSE", "Erro ao tentar ler o histórico: " + e.message, "FECHAR");
         return;
      }

      if (!Array.isArray(hist) || hist.length === 0) {
        chamarAlertaTatico("HISTÓRICO VAZIO", "Nenhuma observação registrada.", "FECHAR");
        return;
      }

      let html = '<div style="text-align:left; max-height: 250px; overflow-y: auto; padding-right: 4px; margin-bottom: 8px;" class="custom-scrollbar">';
      hist.reverse().forEach((h) => {
        let textoEscapado = "";
        try { textoEscapado = window.escapeHTML ? window.escapeHTML(h.texto) : String(h.texto); } catch(e) { textoEscapado = String(h.texto); }
        let obsFormatada = '<strong>' + (h.data || 'Sem data') + ' - ' + (h.usuario || 'Desconhecido') + '</strong><br>' + textoEscapado;
        html += '<div style="margin-bottom: 6px; padding: 6px; background: rgba(255,255,255,0.05); border-left: 3px solid var(--brand-red); border-radius: 4px;">';
        html += '<div style="font-size:11px; color:var(--text-primary); white-space: pre-wrap; line-height: 1.4;">' + obsFormatada + '</div>';
        html += '</div>';
      });
      html += '</div>';

      if (btnElement && btnElement.previousElementSibling && btnElement.previousElementSibling.id && btnElement.previousElementSibling.id.startsWith("hist-container-")) {
          btnElement.previousElementSibling.innerHTML = html;
          btnElement.previousElementSibling.style.display = "block";
          btnElement.style.display = "none";
          return;
      }

      chamarAlertaTatico("HISTÓRICO DE OBSERVAÇÕES", html, "FECHAR");
    } catch(err) {
      console.error("Erro CRÍTICO capturado no catch:", err);
      chamarAlertaTatico("ERRO CRÍTICO", "O botão falhou com o seguinte erro:<br>" + err.message, "FECHAR");
    }
  }

  function conferirMandadoClick(mandado, btn) {
    btn.innerText = "⏳ Conferindo..."; btn.disabled = true;
    google.script.run.withSuccessHandler(function(res) {
      chamarAlertaTatico("CONFERÊNCIA", res.mensagem, "OK");
      btn.innerText = "✅ CONFERIDO"; btn.disabled = true;
      const alvo = dadosMandados.find(function(d) { return d.mandado === mandado; });
      if (alvo) {
        const hoje = new Date();
        const dia = hoje.getDate().toString().padStart(2,'0');
        const mes = (hoje.getMonth()+1).toString().padStart(2,'0');
        const ano = hoje.getFullYear();
        const hora = hoje.getHours().toString().padStart(2,'0');
        const min = hoje.getMinutes().toString().padStart(2,'0');
        const seg = hoje.getSeconds().toString().padStart(2,'0');
        alvo.dataConferencia = dia + '/' + mes + '/' + ano + ' ' + hora + ':' + min + ':' + seg;
      }
    }).conferirMandado(mandado);
  }

  function normalizarArea(txt) {
    if (!txt) return "";
    return String(txt)
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "") // remove acentos
      .replace(/\./g, "")             // remove pontos
      .replace(/\s+/g, "")            // remove todos os espaços
      .replace(/[\-\_\/]/g, "")       // remove traços, sublinhados, barras
      .replace(/^0+/, "")             // remove zeros à esquerda (ex: "02º" -> "2º")
      .trim();
  }

  function filtrarNoMapa() {
    const termoNome = document.getElementById('filtroNome').value.toLowerCase();
    const filtroCPI = document.getElementById('filtroCPI').value;
    const filtroCPM = (() => { const el = document.getElementById('filtroCPMMobile'); return el ? el.value : 'TODOS'; })();
    const filtroBPM = document.getElementById('filtroBatalhao').value;
    const filtroCIA = document.getElementById('filtroCIA').value;
    const elDP = document.getElementById('filtroDP');
    const filtroDP = elDP ? elDP.value : 'TODOS';
    
    // Filtros avançados (modal/drawer) - Suporte aos IDs mobile
    const elCrime = document.getElementById('filtroCrime') || document.getElementById('filtroCrimeMobile');
    const filtroCrime = elCrime ? elCrime.value : 'TODOS';
    const elArtigo = document.getElementById('filtroArtigo') || document.getElementById('filtroArtigoMobile');
    const filtroArtigo = elArtigo ? elArtigo.value : 'TODOS';
    const elParagrafo = document.getElementById('filtroParagrafo') || document.getElementById('filtroParagrafoMobile');
    const filtroParagrafo = elParagrafo ? elParagrafo.value : 'TODOS';
    const elInciso = document.getElementById('filtroInciso') || document.getElementById('filtroIncisoMobile');
    const filtroInciso = elInciso ? elInciso.value : 'TODOS';
    
    const elSexo = document.getElementById('filtroSexo') || document.getElementById('filtroSexoMobile');
    const filtroSexo = elSexo ? elSexo.value : 'TODOS';
    const elTipoMandado = document.getElementById('filtroTipoMandado') || document.getElementById('filtroTipoMandadoMobile');
    const filtroTipo = elTipoMandado ? elTipoMandado.value : 'TODOS';

    // Filtro de validade por prazo (chips ≤N dias)
    const elValidDias = document.getElementById('filtroValidadeDias');
    const validDiasStr = elValidDias ? elValidDias.value : '';
    const validDias = validDiasStr ? parseInt(validDiasStr) : null;
    const hoje = new Date();
    hoje.setHours(0,0,0,0);
    const prazoLimite = validDias ? new Date(hoje.getTime() + validDias * 86400000) : null;
    
    const filtrados = dadosMandados.filter(function(alvo) {
      // Busca ampliada: nome, mandado, tipificação/crime
      const nomeAlvo = (alvo.nome || '').toLowerCase();
      const mandadoAlvo = (alvo.mandado || '').toLowerCase();
      const infoAlvo = (alvo.infoProcessuais || '').toLowerCase();
      const matchNome = !termoNome || nomeAlvo.includes(termoNome) || mandadoAlvo.includes(termoNome) || infoAlvo.includes(termoNome);
      
      // Filtros de Área (Principal ou Secundários)
      let matchPrincipal = false;
      const normFiltroCPI = normalizarArea(filtroCPI);
      const normFiltroCPM = normalizarArea(filtroCPM);
      const normFiltroBPM = normalizarArea(filtroBPM);
      const normFiltroCIA = normalizarArea(filtroCIA);
      const normFiltroDP = normalizarArea(filtroDP);

      // CPI inclui tanto CPI quanto CPM (um campo no banco)
      const cpiAlvoNorm = normalizarArea(alvo.cpiArea);
      let okCPI = filtroCPI === 'TODOS' || cpiAlvoNorm === normFiltroCPI || alvo.semEndereco;
      let okCPM = filtroCPM === 'TODOS' || cpiAlvoNorm === normFiltroCPM || alvo.semEndereco;
      let okBPM = filtroBPM === 'TODOS' || normalizarArea(alvo.bpmArea) === normFiltroBPM || normalizarArea(alvo.batalhao) === normFiltroBPM || alvo.semEndereco;
      let okCIA = filtroCIA === 'TODOS' || normalizarArea(alvo.ciaArea) === normFiltroCIA || alvo.semEndereco;
      let okDP = filtroDP === 'TODOS' || normalizarArea(alvo.dpArea) === normFiltroDP || alvo.semEndereco;
      if (okCPI && okCPM && okBPM && okCIA && okDP) matchPrincipal = true;

      let matchSecundario = false;
      if (filtroCPI !== 'TODOS' || filtroCPM !== 'TODOS' || filtroBPM !== 'TODOS' || filtroCIA !== 'TODOS' || filtroDP !== 'TODOS') {
        try {
          const listaSec = JSON.parse(alvo.geodataSecundarios || '[]');
          for (let i = 0; i < listaSec.length; i++) {
            let sec = listaSec[i];
            let secOkCPI = filtroCPI === 'TODOS' || normalizarArea(sec.cpi) === normFiltroCPI;
            let secOkCPM = filtroCPM === 'TODOS' || normalizarArea(sec.cpi) === normFiltroCPM;
            let secOkBPM = filtroBPM === 'TODOS' || normalizarArea(sec.batalhao) === normFiltroBPM;
            let secOkCIA = filtroCIA === 'TODOS' || normalizarArea(sec.cia) === normFiltroCIA;
            let secOkDP = filtroDP === 'TODOS' || normalizarArea(sec.delegacia || sec.dpArea) === normFiltroDP;
            if (secOkCPI && secOkCPM && secOkBPM && secOkCIA && secOkDP) {
              matchSecundario = true;
              break;
            }
          }
        } catch(e) {}
      }

      const matchArea = (matchPrincipal || matchSecundario);
      
      // Filtro Crime e Subfiltros
      var matchCrime = true;
      if (filtroCrime !== 'TODOS') {
        var crimeAlvo = typeof classificarCrime === 'function' ? classificarCrime(alvo.infoProcessuais || '') : {nome:''};
        matchCrime = (crimeAlvo.nome === filtroCrime);
      }
      
      var matchArtigo = true;
      if (filtroArtigo !== 'TODOS') {
        var aRegex = new RegExp('Artigo:\\s*([^|\\n]+)', 'i');
        var aMatch = (alvo.infoProcessuais || '').match(aRegex);
        matchArtigo = aMatch && aMatch[1].trim().toUpperCase() === filtroArtigo.toUpperCase();
      }

      var matchParagrafo = true;
      if (filtroParagrafo !== 'TODOS') {
        var pRegex = new RegExp('Parágrafo:\\s*([^|\\n]+)', 'i');
        var pMatch = (alvo.infoProcessuais || '').match(pRegex);
        matchParagrafo = pMatch && pMatch[1].trim().toUpperCase() === filtroParagrafo.toUpperCase();
      }

      var matchInciso = true;
      if (filtroInciso !== 'TODOS') {
        var iRegex = new RegExp('Inciso:\\s*([^|\\n]+)', 'i');
        var iMatch = (alvo.infoProcessuais || '').match(iRegex);
        matchInciso = iMatch && iMatch[1].trim().toUpperCase() === filtroInciso.toUpperCase();
      }

      // Filtro Sexo
      var matchSexo = true;
      if (filtroSexo !== 'TODOS') {
        var valSexo = (alvo.sexo || '').toUpperCase().trim();
        if (valSexo === 'M') valSexo = 'MASCULINO';
        if (valSexo === 'F') valSexo = 'FEMININO';
        matchSexo = (valSexo === filtroSexo);
      }

      // Filtro Tipo Mandado
      var matchTipo = true;
      if (filtroTipo !== 'TODOS') {
        var tituloMandado = '';
        try {
          var extras = alvo.dadosExtrasJSON ? JSON.parse(alvo.dadosExtrasJSON) : {};
          tituloMandado = (extras.titulo || alvo.mandado || '').toUpperCase();
        } catch(e) {}
        matchTipo = tituloMandado.includes(filtroTipo.toUpperCase());
      }

      // Filtro de Validade por Prazo
      var matchValidade = true;
      if (prazoLimite) {
        var validadeAlvoStr = (alvo.validade || '').trim();
        var validadeAlvo = null;
        var partsV = validadeAlvoStr.split(/[-\/]/);
        if (partsV.length === 3) {
          var dv = parseInt(partsV[0]), mv = parseInt(partsV[1]), yv = parseInt(partsV[2]);
          if (!isNaN(dv) && !isNaN(mv) && !isNaN(yv)) {
            validadeAlvo = new Date(yv, mv - 1, dv);
            validadeAlvo.setHours(0,0,0,0);
          }
        }
        if (!validadeAlvo || validadeAlvo > prazoLimite) matchValidade = false;
      }
      
      return matchNome && matchArea && matchCrime && matchArtigo && matchParagrafo && matchInciso && matchSexo && matchTipo && matchValidade;
    });
    
    renderizarPinos(filtrados);
    if (typeof renderizarTabelaMandados === 'function') renderizarTabelaMandados(filtrados);
    if (typeof aplicarFiltrosDePoligono === 'function') aplicarFiltrosDePoligono(filtroCPI, filtroBPM, filtroCIA, filtroDP);
  }

  // ---- STREET VIEW COM TOAST E OCULTAÇÃO DE CARD ----
  function abrirStreetView(lat, lng) {
    if (typeof lat !== 'number' || typeof lng !== 'number' || isNaN(lat) || isNaN(lng)) return;

    // 1. Ocultar card com classe .card-disabled
    var cardEl = document.querySelector('.card-container');
    if (cardEl) cardEl.classList.add('card-disabled');

    // 2. Mostrar toast com instrução
    var toastExist = document.getElementById('toastStreetView');
    if (toastExist) toastExist.remove();
    var toast = document.createElement('div');
    toast.id = 'toastStreetView';
    toast.className = 'toast-streetview';
    toast.innerHTML =
      '<span class="material-symbols-outlined toast-icon">streetview</span>' +
      '<span>Street View ativo — pressione <strong>ESC</strong> ou clique em Voltar para fechar</span>' +
      '<button class="toast-close-btn" onclick="fecharStreetView()">✖ Voltar</button>';
    document.body.appendChild(toast);

    // 3. Listener ESC para fechar
    document.addEventListener('keydown', _svEscHandler);

    // 4. Garantir que o mapa está visível
    var mapDiv = document.getElementById('mapa');
    if (mapDiv) mapDiv.style.display = 'block';

    // 5. Abrir panorama
    var panorama = mapaPrincipal.getStreetView();
    panorama.setPosition({ lat: lat, lng: lng });
    panorama.setPov({ heading: 0, pitch: 0 });
    panorama.setVisible(true);

    // 6. Listener nativo do Maps para detectar fechamento pelo botão ← do Street View
    if (window._svVisibleListener) {
      google.maps.event.removeListener(window._svVisibleListener);
    }
    window._svVisibleListener = panorama.addListener('visible_changed', function() {
      if (!panorama.getVisible()) fecharStreetView();
    });
  }

  function fecharStreetView() {
    // Remover toast
    var toast = document.getElementById('toastStreetView');
    if (toast) toast.remove();

    // Restaurar card
    var cardEl = document.querySelector('.card-container');
    if (cardEl) cardEl.classList.remove('card-disabled');

    // Remover listener ESC
    document.removeEventListener('keydown', _svEscHandler);

    // Remover listener do Maps
    if (window._svVisibleListener) {
      google.maps.event.removeListener(window._svVisibleListener);
      window._svVisibleListener = null;
    }

    // Fechar panorama se ainda estiver visível
    if (typeof mapaPrincipal !== 'undefined' && mapaPrincipal) {
      var panorama = mapaPrincipal.getStreetView();
      if (panorama && panorama.getVisible()) panorama.setVisible(false);
    }
  }

  function _svEscHandler(e) {
    if (e.key === 'Escape') fecharStreetView();
  }

  function geocodeEndereco(geocoder, endereco) {
    return new Promise(function(resolve) {
      geocoder.geocode({ 'address': endereco }, function(results, status) {
        if (status === 'OK') {
          var uf = "";
          var comps = results[0].address_components;
          for (var i = 0; i < comps.length; i++) {
            if (comps[i].types.includes("administrative_area_level_1")) {
              uf = comps[i].short_name;
              break;
            }
          }
          resolve({ 
            lat: results[0].geometry.location.lat(), 
            lng: results[0].geometry.location.lng(),
            uf: uf
          });
        }
        else resolve(null);
      });
    });
  }

      avatarHtml = `<img src="${op.fotoUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;

    let strData = (op.ultimoLogin || 'Nunca').replace(' (Offline)', '').replace('Offline', '');
    let infoAcesso = isOnline ? 'Conectado' : 'Último login: ' + (strData.trim() || 'Nunca');
    let corStatus = isOnline ? 'var(--success)' : 'var(--text-muted)';
    
    return `
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-surface);border:1px solid rgba(255,255,255,0.05);border-radius:var(--radius-sm);">
      <div style="position:relative;width:32px;height:32px;border-radius:50%;background:var(--bg-depressed);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        ${avatarHtml}
        <div style="position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;background:${corStatus};border-radius:50%;border:2px solid var(--bg-surface);"></div>
      </div>
      <div style="display:flex;flex-direction:column;flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${op.nome !== 'Nome a Definir' ? op.nome : op.email}</div>
        <div style="font-size:10px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${infoAcesso}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;">
        <span style="font-size:9px;font-weight:800;color:var(--text-muted);">${op.qtdAcessos || 0} acessos</span>
      </div>
    </div>`;
  }

  function gerarHtmlCard(op) {
    var emailSeg = op.email.replace(/'/g, "\\'");
    
    let estiloSeloPatente = '';
    let perfilExibido = op.perfil;
    if (op.perfil === 'Admin') {
      estiloSeloPatente = 'background: rgba(239, 68, 68, 0.12); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.25);';
      perfilExibido = 'Administrador';
    } else if (op.perfil === 'Colaborador') {
      estiloSeloPatente = 'background: rgba(59, 130, 246, 0.12); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.25);';
    } else {
      estiloSeloPatente = 'background: rgba(16, 185, 129, 0.12); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.25);';
      perfilExibido = 'Patrulheiro';
    }
    
    let statusSeloHtml = '';
    if (op.status === 'PENDENTE') {
      statusSeloHtml = `<span style="font-size:9px;font-weight:900;padding:2px 8px;border-radius:99px;text-transform:uppercase;background: rgba(245, 158, 11, 0.12); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.25);">PENDENTE</span>`;
    } else if (op.status === 'BLOQUEADO' || op.status === 'INATIVO' || op.status === 'REPROVADO') {
      statusSeloHtml = `<span style="font-size:9px;font-weight:900;padding:2px 8px;border-radius:99px;text-transform:uppercase;background: rgba(239, 68, 68, 0.12); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.25);">BLOQUEADO</span>`;
    }
    
    let botoesHtml = '';
    if (op.status === 'PENDENTE') {
      botoesHtml += `<button class="neu-btn" style="padding:8px 12px;font-size:10px;height:36px;background:var(--success);color:white;border-color:rgba(16,185,129,0.3);box-shadow:none;margin:0;font-weight:800;" onclick="acionarBotaoUsuario('${emailSeg}', 'ATIVO', this)"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">check</span> AUTORIZAR</button>`;
    } else if (op.status === 'BLOQUEADO' || op.status === 'REPROVADO') {
      botoesHtml += `<button class="neu-btn" style="padding:8px 12px;font-size:10px;height:36px;color:var(--success);border-color:rgba(16,185,129,0.2);box-shadow:none;margin:0;font-weight:800;" onclick="acionarBotaoUsuario('${emailSeg}', 'DESBLOQUEADO', this)"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">lock_open</span> DESBLOQUEAR</button>`;
    } else if (op.status === 'ATIVO') {
      botoesHtml += `<button class="neu-btn" style="padding:8px 12px;font-size:10px;height:36px;color:var(--warning);border-color:rgba(245,158,11,0.2);box-shadow:none;margin:0;font-weight:800;" onclick="acionarBotaoUsuario('${emailSeg}', 'BLOQUEADO', this)"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">lock</span> BLOQUEAR</button>`;
    }
    
    let avatarHtml = '';
    if (op.fotoUrl && op.fotoUrl.trim() !== '') {
      avatarHtml = `<img src="${op.fotoUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
    } else {
      avatarHtml = `<span class="material-symbols-outlined" style="font-size:24px;color:var(--text-muted);">shield_person</span>`;
    }
    
    let dataFormatada = "Data Desconhecida";
    if (op.dataCadastro && op.dataCadastro !== "Desconhecida" && op.dataCadastro.trim() !== "") {
       // O formato esperado que vem de Seguranca.gs é "dd/MM/yyyy HH:mm:ss"
       dataFormatada = op.dataCadastro; 
    }
    
    return `
    <div class="card-operador" style="display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--bg-surface);border:var(--glass-border);border-radius:var(--radius-md);box-shadow:var(--neu-raised-sm);gap:16px;flex-wrap:wrap;transition:var(--transition);">
      <!-- Lado Esquerdo: Avatar + Info -->
      <div style="display:flex;align-items:center;gap:14px;flex:1;min-width:240px;">
        <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;background:var(--bg-depressed);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          ${avatarHtml}
        </div>
        <div style="display:flex;flex-direction:column;gap:2px;overflow:hidden;text-align:left;">
          <div style="font-weight:800;font-size:14px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${op.email}">
            ${op.email}
          </div>
          <div style="font-size:11px;color:var(--text-secondary);font-weight:600;">
            ${op.nome !== 'Nome a Definir' ? op.nome : 'Sem Nome de Guerra'} · <span style="color:var(--text-muted);">${op.unidade !== 'Unidade a Definir' ? op.unidade : 'Sem Unidade'}</span>
          </div>
          <div style="font-size:10px;color:var(--text-muted);font-weight:500;margin-top:2px;line-height:1.4;">
            Cadastrado em: <span style="color:var(--text-secondary);">${dataFormatada}</span><br>
            Último Acesso: <span style="color:var(--text-secondary);">${op.ultimoLogin || 'Nunca'}</span><br>
            Acessos Registrados: <span style="color:var(--text-secondary);">${op.qtdAcessos || 0}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;">
            <span style="font-size:9px;font-weight:900;padding:2px 8px;border-radius:99px;text-transform:uppercase;${estiloSeloPatente}">${perfilExibido}</span>
            ${statusSeloHtml}
          </div>
        </div>
      </div>
      <!-- Lado Direito: Ações (Botões de Perfil + Revogar) -->
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
        <div style="display:flex;background:var(--bg-depressed);border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);">
          <button style="border:none;background:${op.perfil==='Patrulheiro'?'var(--accent)':'transparent'};color:${op.perfil==='Patrulheiro'?'white':'var(--text-secondary)'};font-size:9px;font-weight:800;padding:6px 10px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;" onclick="mudarPerfilGkDirect('${emailSeg}', 'Patrulheiro', this)">PTRL</button>
          <button style="border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);background:${op.perfil==='Colaborador'?'var(--accent)':'transparent'};color:${op.perfil==='Colaborador'?'white':'var(--text-secondary)'};font-size:9px;font-weight:800;padding:6px 10px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;" onclick="mudarPerfilGkDirect('${emailSeg}', 'Colaborador', this)">COLAB</button>
          <button style="border:none;background:${op.perfil==='Admin'?'var(--accent)':'transparent'};color:${op.perfil==='Admin'?'white':'var(--text-secondary)'};font-size:9px;font-weight:800;padding:6px 10px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;" onclick="mudarPerfilGkDirect('${emailSeg}', 'Admin', this)">ADM</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${botoesHtml}
          <button class="neu-btn" style="padding:8px 12px;font-size:10px;height:36px;color:var(--danger);border-color:rgba(239,68,68,0.2);box-shadow:none;margin:0;display:flex;align-items:center;gap:4px;" onclick="excluirUsuarioDefinitivoGK('${emailSeg}', this)" title="Excluir Acesso Definitivamente">
            <span class="material-symbols-outlined" style="font-size:16px;">delete</span> EXCLUIR
          </button>
        </div>
      </div>
    </div>`;
  }

  function acionarBotaoUsuario(email, acao, btnElement) {
    if (acao === 'EXCLUIDO') {
      chamarAlertaTatico("ATENÇÃO PERIGO", "Tem certeza que deseja EXCLUIR este operador permanentemente? O acesso será revogado em definitivo.", "CONFIRMAR", function(confirma) {
        if(confirma) executarAcaoRede(email, acao, btnElement);
      });
    } else if (acao === 'REPROVADO' || acao === 'BLOQUEADO') {
      chamarAlertaTatico("ATENÇÃO", "Deseja " + acao.toLowerCase() + " o acesso deste operador?", "CONFIRMAR", function(confirma) {
        if(confirma) executarAcaoRede(email, acao, btnElement);
      });
    } else {
      executarAcaoRede(email, acao, btnElement);
    }
  }

  function executarAcaoRede(email, acao, btnElement) {
    var txtOriginal = btnElement.innerHTML;
    btnElement.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;animation:spin 1s linear infinite">sync</span> AGUARDE';
    btnElement.disabled = true;
    var card = btnElement.closest('.card-operador');
    if(card) card.style.opacity = "0.6";

    let statusFinal = acao;
    if (acao === 'DESBLOQUEADO') statusFinal = 'ATIVO';

    google.script.run.withSuccessHandler(function(res) {
      if (res.sucesso) { 
        carregarUsuariosGrade();
      } else { 
        chamarAlertaTatico("FALHA", res.mensagem, "OK"); 
        if(card) card.style.opacity = "1"; 
        btnElement.innerHTML = txtOriginal;
        btnElement.disabled = false;
      }
    }).alterarStatusOperador(email, statusFinal);
  }

  function aprovarTodosPendentes() {
    chamarAlertaTatico("APROVAR TODOS", "Deseja realmente aprovar TODOS os operadores pendentes?", "CONFIRMAR", function(confirma) {
      if (confirma) {
        google.script.run.withSuccessHandler(function(res) {
          if (res.sucesso) {
            chamarAlertaTatico("SUCESSO", res.mensagem, "OK");
            carregarUsuariosGrade();
          } else {
            chamarAlertaTatico("ERRO", res.mensagem, "OK");
          }
        }).aprovarTodosUsuariosPendentes();
      }
    });
  }

  function processarDecisaoAdmin(email, decisao, botao) {
    var card = botao.closest('.card-operador'); 
    card.style.opacity = "0.3"; 
    botao.disabled = true;
    google.script.run.withSuccessHandler(function(res) {
      if (res.sucesso) { 
        chamarAlertaTatico("OK", "Operador: " + decisao, "OK"); 
        carregarUsuariosGrade();
      } else { 
        chamarAlertaTatico("FALHA", res.mensagem, "OK"); 
        card.style.opacity = "1"; 
        botao.disabled = false;
      }
    }).alterarStatusOperador(email, decisao);
  }
</script>

<!-- GATEKEEPER SCRIPTS -->
<script>
  function selecionarNovaPatente(btn) {
    // Remove estilos ativos de todos
    document.querySelectorAll('.patente-btn').forEach(b => {
      b.style.background = 'transparent';
      if(b.getAttribute('data-val') === 'Patrulheiro') { b.style.color = 'var(--text-secondary)'; b.style.borderColor = 'var(--border)'; }
      if(b.getAttribute('data-val') === 'Colaborador') { b.style.color = 'var(--text-secondary)'; b.style.borderColor = 'var(--border)'; }
      if(b.getAttribute('data-val') === 'Admin') { b.style.color = 'var(--text-secondary)'; b.style.borderColor = 'var(--border)'; }
    });
    
    // Adiciona estilo ativo no selecionado
    const val = btn.getAttribute('data-val');
    if (val === 'Patrulheiro') {
      btn.style.background = 'rgba(59,130,246,0.1)'; btn.style.color = '#3b82f6'; btn.style.borderColor = 'rgba(59,130,246,0.4)';
    } else if (val === 'Colaborador') {
      btn.style.background = 'rgba(245,158,11,0.1)'; btn.style.color = '#f59e0b'; btn.style.borderColor = 'rgba(245,158,11,0.4)';
    } else if (val === 'Admin') {
      btn.style.background = 'rgba(16,185,129,0.1)'; btn.style.color = '#10b981'; btn.style.borderColor = 'rgba(16,185,129,0.4)';
    }
    document.getElementById('gk_novo_perfil').value = val;
  }

  function addUsuarioGatekeeper(btn) {
    const email = document.getElementById('gk_novo_email').value.trim();
    const nome = document.getElementById('gk_novo_nome').value.trim();
    const perfil = document.getElementById('gk_novo_perfil').value;
    
    if (!email) {
      chamarAlertaTatico("ATENÇÃO", "E-mail é obrigatório.", "OK");
      return;
    }
    if (!nome) {
      chamarAlertaTatico("ATENÇÃO", "Nome de guerra é obrigatório.", "OK");
      return;
    }

    const txtOriginal = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;animation:spin 1s linear infinite;">refresh</span> ADICIONANDO NO BANCO DE DADOS...';
    btn.disabled = true;

    google.script.run.withSuccessHandler(function(resp) {
      btn.innerHTML = txtOriginal;
      btn.disabled = false;
      if (resp.sucesso) {
        chamarAlertaTatico("SUCESSO", resp.mensagem, "OK");
        
        // Limpar dados do formulário
        document.getElementById('gk_novo_email').value = '';
        document.getElementById('gk_novo_nome').value = '';
        document.getElementById('gk_novo_perfil').value = 'Patrulheiro';
        document.querySelectorAll('.patente-btn').forEach(b => {
          b.style.background = 'transparent'; b.style.color = 'var(--text-secondary)'; b.style.borderColor = 'var(--border)';
          if (b.getAttribute('data-val') === 'Patrulheiro') {
            b.style.background = 'rgba(59,130,246,0.1)'; b.style.color = '#3b82f6'; b.style.borderColor = 'rgba(59,130,246,0.4)';
          }
        });
        
        carregarListaUsuarios();
      } else {
        chamarAlertaTatico("FALHA", resp.mensagem, "OK");
      }
    }).adicionarUsuarioDireto(email, perfil, nome);
  }

  function mudarPerfilGkDirect(email, novoPerfil, btn) {
    const txtOrig = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:12px;animation:spin 1s linear infinite;">refresh</span>';
    btn.disabled = true;
    
    google.script.run.withSuccessHandler(function(resp) {
      if(resp.sucesso) {
        chamarAlertaTatico("SUCESSO", resp.mensagem, "OK");
        carregarListaUsuarios();
      } else {
        btn.innerHTML = txtOrig;
        btn.disabled = false;
        chamarAlertaTatico("FALHA", resp.mensagem, "OK");
      }
    }).alterarPerfilUsuario(email, novoPerfil);
  }

  function excluirUsuarioDefinitivoGK(email, btn) {
    if (!confirm("Tem certeza que deseja EXCLUIR instantaneamente o acesso de " + email + "? A exclusão será definitiva.")) return;
    
    const txtOriginal = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;animation:spin 1s linear infinite;">refresh</span>';
    btn.disabled = true;

    google.script.run.withSuccessHandler(function(resp) {
      if(resp.sucesso) {
        chamarAlertaTatico("SUCESSO", resp.mensagem, "OK");
        carregarListaUsuarios();
      } else {
        btn.innerHTML = txtOriginal;
        btn.disabled = false;
        chamarAlertaTatico("FALHA", resp.mensagem, "OK");
      }
    }).excluirUsuarioDefinitivo(email);
  }
</script>
