<script>
/* ================================================================
     MÓDULO 4: CARD DE INTELIGÊNCIA (NEUMÓRFICO)
     ================================================================ */
  function montarCardInteligencia(alvo) {
    // Função helper para evitar XSS (Sanitização)
    const escapeHTML = function(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    };

    const btnCopiar = function(txt) {
      if (!txt || txt === "N/A") return "";
      const txtSeguro = escapeHTML(txt);
      return '<span class="icone-copiar" onclick="copiarDadoTatico(\'' + txtSeguro + '\', this)" title="Copiar"><span class="material-symbols-outlined" style="font-size:14px;">content_copy</span></span>';
    };

    let extras = {};
    try { extras = JSON.parse(alvo.dadosExtrasJSON || "{}"); } catch(e) {}

    const isValido = function(val) {
      if (!val) return false;
      const v = val.trim().toLowerCase();
      return !["", "n/a", "-", "não", "nao", "não informado", "nao informado", "não informada", "nao informada", "não consta", "nao consta"].includes(v);
    };

    // Classificar crime
    const crimeInfo = classificarCrime(alvo.infoProcessuais || '');

    // Dias restantes para validade
    const diasRestantes = calcularDiasRestantes(alvo.validade);
    let validadeClass = '';
    let validadeTexto = '';
    // Helper: converte dias para "X ano(s), Y mês(es) e Z dia(s)"
    const formatarDiasRestantes = function(dias) {
      if (dias <= 0) return Math.abs(dias) + ' dias';
      const anos = Math.floor(dias / 365);
      const meses = Math.floor((dias % 365) / 30);
      const d = dias % 30;
      let parts = [];
      if (anos > 0) parts.push(anos + (anos === 1 ? ' ano' : ' anos'));
      if (meses > 0) parts.push(meses + (meses === 1 ? ' mês' : ' meses'));
      if (d > 0 || parts.length === 0) parts.push(d + (d === 1 ? ' dia' : ' dias'));
      return parts.join(', ');
    };
    if (diasRestantes !== null) {
      const limVerde = parseInt(configsSistema.validade_verde_dias) || 91;
      const limAmarelo = parseInt(configsSistema.validade_amarelo_dias) || 90;
      const limLaranja = parseInt(configsSistema.validade_laranja_dias) || 30;
      const limVermelho = parseInt(configsSistema.validade_vermelho_dias) || 15;
      const textoFormatado = formatarDiasRestantes(diasRestantes);

      if (diasRestantes <= 0) { validadeClass = 'validade-vencido'; validadeTexto = '<span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle;">warning</span> VENCIDO há ' + textoFormatado; }
      else if (diasRestantes <= limVermelho) { validadeClass = 'validade-vermelho'; validadeTexto = '<span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle;">error</span> Faltam ' + textoFormatado; }
      else if (diasRestantes <= limLaranja) { validadeClass = 'validade-laranja'; validadeTexto = '<span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle;">schedule</span> Faltam ' + textoFormatado; }
      else if (diasRestantes <= limAmarelo) { validadeClass = 'validade-amarelo'; validadeTexto = '<span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle;">timer</span> Faltam ' + textoFormatado; }
      else { validadeClass = 'validade-verde'; validadeTexto = '<span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle;">check_circle</span> ' + textoFormatado; }
    }

    // Tooltip helper
    const tooltip = function(texto) {
      const t = configsSistema['tooltip_' + texto] || texto;
      return '<span class="tooltip-trigger">?<span class="tooltip-balloon">' + t + '</span></span>';
    };

    // Distância KM (Haversine)
    let htmlDistancia = '';
    if (posicaoPatrulheiro) {
      const km = calcularHaversine(posicaoPatrulheiro.lat, posicaoPatrulheiro.lng, alvo.lat, alvo.lng);
      htmlDistancia = '<div class="km-badge"><span class="material-symbols-outlined" style="font-size:16px;">near_me</span> ' + km.toFixed(1) + ' km' + tooltip('distancia') + '</div>';
    }

    // Secundários com numeração
    let htmlSecundarios = "";
    // Construir htmlArea para cada endereço secundário (reutilizável)
    const montarAreaBadge = function(areaData) {
      if (!areaData) return '';
      if (areaData.cpi === "FORA DO ESTADO") {
        return '<div style="display:flex;margin-top:4px;"><span style="font-size:9px;font-weight:800;color:var(--danger);padding:3px 8px;background:rgba(255,59,48,0.15);border-radius:3px;border:1px solid rgba(255,59,48,0.3);">FORA DO ESTADO</span></div>';
      }
      let h = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">';
      if (areaData.cpi) h += '<span style="font-size:9px;font-weight:800;color:var(--brand-red);padding:3px 6px;background:rgba(169,32,32,0.12);border-radius:3px;border:1px solid var(--brand-red);">COMANDO: ' + areaData.cpi + '</span>';
      if (areaData.batalhao) h += '<span style="font-size:9px;font-weight:700;color:var(--text-primary);padding:3px 6px;background:rgba(255,255,255,0.08);border-radius:3px;border:1px solid rgba(255,255,255,0.2);">BTL: ' + areaData.batalhao + '</span>';
      if (areaData.cia) h += '<span style="font-size:9px;font-weight:700;color:var(--text-primary);padding:3px 6px;background:rgba(255,255,255,0.08);border-radius:3px;border:1px solid rgba(255,255,255,0.2);">CIA: ' + areaData.cia + '</span>';
      if (areaData.delegacia) h += '<span style="font-size:9px;font-weight:700;color:var(--text-secondary);padding:3px 6px;background:rgba(255,255,255,0.04);border-radius:3px;border:1px solid rgba(255,255,255,0.1);">DP: ' + areaData.delegacia + '</span>';
      h += '</div>';
      return h;
    };
    try {
      const listaSec = JSON.parse(alvo.geodataSecundarios || "[]");
      if (listaSec.length > 0) {
        listaSec.forEach(function(sec, idx) {
          let kmSec = '';
          if (posicaoPatrulheiro && typeof sec.lat === 'number' && typeof sec.lng === 'number') {
            const d = calcularHaversine(posicaoPatrulheiro.lat, posicaoPatrulheiro.lng, sec.lat, sec.lng);
            kmSec = '<div class="km-badge" style="font-size:10px;padding:4px 8px;margin-bottom:6px;"><span class="material-symbols-outlined" style="font-size:14px;">near_me</span> ' + d.toFixed(1) + ' km</div>';
          }
          // Área do endereço secundário
          let areaSec = montarAreaBadge(sec);
          htmlSecundarios += '<div class="endereco-sec-item">' + kmSec +
            '<div class="endereco-texto"><strong>Outro Endereço ' + (idx + 1) + ':</strong>' + sec.endereco + btnCopiar(sec.endereco) + '</div>' +
            areaSec +
            '<div style="display:flex;gap:6px;">' +
              '<button class="btn-rota-sec" onclick="abrirGpsNativo(' + sec.lat + ', ' + sec.lng + ')"><span class="material-symbols-outlined" style="font-size:16px;">explore</span> ROTA</button>' +
              '<button class="btn-rota-sec" style="width:auto;padding:8px;background:#FBBC04;" onclick="abrirStreetView(' + sec.lat + ', ' + sec.lng + ')" title="Street View"><svg width="16" height="16" viewBox="0 0 24 24" fill="#1a1a1a"><path d="M12.56 14.33c-.34.27-.56.7-.56 1.17V21h7c1.1 0 2-.9 2-2v-5.98c-.94-.33-1.95-.52-3-.52-2.03 0-3.93.7-5.44 1.83zM12 6c1.93 0 3.5-1.57 3.5-3.5S13.93-1 12-1 8.5.57 8.5 2.5 10.07 6 12 6zm-1.44 8.33C9.07 12.93 7.14 12.23 5 12.23c-1.05 0-2.06.19-3 .52V19c0 1.1.9 2 2 2h7v-5.5c0-.47-.22-.9-.56-1.17l-.88-.67zM12 8c-1.66 0-3 1.34-3 3 0 .35.07.69.18 1.01L12 14.34l2.82-2.33c.11-.32.18-.66.18-1.01 0-1.66-1.34-3-3-3z"/></svg></button>' +
            '</div></div>';
        });
      } else {
        htmlSecundarios = '<div style="color:var(--text-muted);font-size:11px;text-align:center;padding:10px;">Nenhum endereço adicional.</div>';
      }
    } catch (e) { htmlSecundarios = "Erro ao ler endereços."; }

    // Validade formatada
    let strValidade = alvo.validade || "";
    let dataPura = strValidade.match(/(\d{2}[\/\.]\d{2}[\/\.]\d{4})/);
    dataPura = dataPura ? dataPura[1].replace(/\./g, '/') : strValidade;

    // Perfil
    let htmlPerfil = '';
    const addP = function(lbl, val) { if (isValido(val)) htmlPerfil += '<div style="margin:0;padding:2px 0;"><strong>' + lbl + ':</strong> ' + val + '</div>'; };
    addP("Nome Social", extras.nomeSocial); addP("RJI", extras.rji); addP("Alcunha", extras.alcunha);
    addP("Nasc", alvo.nascimento); addP("Sexo", alvo.sexo); addP("Cor", alvo.cor);
    addP("Natural", alvo.naturalidade); addP("Filiação", alvo.filiacao); addP("Marcas", extras.marcas);

    // Info Processual
    
    const infoRaw = alvo.infoProcessuais || "";
    const extP = function(txt, lbl) { const r = new RegExp(lbl + '\\s*([^|\\n]+)', 'i'); const m = txt.match(r); return m ? m[1].trim() : "N/A"; };
    const nProcesso = extP(infoRaw, '(?:Nº do processo|Processo):');
    const orgao = extP(infoRaw, 'Órgão Judicial:');
    let especie = extP(infoRaw, 'Espécie(?: de| da) (?:prisão|Internação):');
    if (especie === "N/A") especie = extP(infoRaw, 'Espécie de prisão:');

    // Parse multiple laws
    let blocosLeis = [];
    let splitLeis = infoRaw.split(/(?=Lei:)/gi);
    if (splitLeis.length > 1) {
      splitLeis.forEach(b => {
        if (b.trim().toLowerCase().startsWith('lei:')) blocosLeis.push(b);
      });
    } else {
      blocosLeis.push(infoRaw); // Fallback
    }

    let htmlTipificacoes = '';
    let badgesHtml = '';
    
    blocosLeis.forEach((bloco, idx) => {
      let lei = extP(bloco, 'Lei:');
      let artigo = extP(bloco, 'Artigo:');
      let paragrafo = extP(bloco, 'Parágrafo:');
      let inciso = extP(bloco, 'Inciso:');

      if (lei !== "N/A" && lei.toLowerCase().includes("art")) {
        let mP = lei.match(/§\s*(.+)$/); if (mP && paragrafo === "N/A") paragrafo = mP[1].trim();
        let mA = lei.match(/art\.?\s*([^,§|]+)(?:,\s*([^,§|]+))?(?:,\s*([^,§|]+))?(?:,\s*([^,§|]+))?/i); 
        if (mA) {
           if (artigo === "N/A" && mA[1]) artigo = mA[1].trim();
           if (paragrafo === "N/A" && mA[2] && mA[2].trim() !== '') paragrafo = mA[2].trim();
           if (inciso === "N/A" && mA[3] && mA[3].trim() !== '') {
              if (mA[4] && mA[4].trim() !== '') { inciso = mA[3].trim() + ", " + mA[4].trim(); } 
              else { inciso = mA[3].trim(); }
           }
        }
        lei = lei.split(/(?:,|\s)\s*art\.?/i)[0].trim();
      }
      if (paragrafo !== "N/A" && paragrafo !== "-" && (inciso === "N/A" || inciso === "-")) {
        var mIncisoEmbutido = paragrafo.match(/^(?:§\s*)?(\d+[ºª°]?(?:-[A-Z])?|caput|c)[\s,]+([a-z]|[IVXLCDM]{1,5}(?:\s*,\s*[IVXLCDM]{1,5})*)$/i);
        if (mIncisoEmbutido) {
          paragrafo = mIncisoEmbutido[1].trim();
          inciso = mIncisoEmbutido[2].trim();
        }
      }
      if (lei === "N/A") lei = "-"; if (artigo === "N/A") artigo = "-"; if (paragrafo === "N/A") paragrafo = "-"; if (inciso === "N/A") inciso = "-";
      
      let crInfo = classificarCrime(bloco);
      if (idx === 0) crInfo = crimeInfo; 
      
      badgesHtml += '<div class="crime-badge" style="background:' + crInfo.cor + ';color:white;margin:0;">' + crInfo.nome + '</div>';

      let stylizedTipificacao = (function(leiNum, artNum, parNum, incNum, crInfo) {
          var _tabLeis = window._tabelaLeis || [];
          function limparNum(v) { return String(v || '').replace(/[.\s]/g, '').replace(/[°ºª]/g, '').trim(); }
          
          var leiL = limparNum(leiNum);
          var artL = limparNum(artNum);
          var parL = limparNum(parNum).replace(/§/g, '').trim();
          var incL = limparNum(incNum);
          
          let tDiploma = null;
          let tArtigo = null;
          let tParagrafo = null;

          // Busca Artigo
          for (var i=0; i<_tabLeis.length; i++) {
            var t = _tabLeis[i];
            if (limparNum(t.numeroLei) === leiL && limparNum(t.artigo) === artL) {
              if (t.leiNome) tDiploma = t.leiNome;
              tArtigo = t.tipificacaoCompleta || t.categoria || null;
              break;
            }
          }

          // Busca Paragrafo
          if (parL && parL !== '-') {
            var parUpper = parL.toUpperCase();
            for (var i=0; i<_tabLeis.length; i++) {
              var t = _tabLeis[i];
              if (limparNum(t.numeroLei) === leiL && limparNum(t.artigo) === artL && (limparNum(t.paragrafo) === parL || (t.paragrafo||'').toUpperCase() === parUpper)) {
                if (t.leiNome && !tDiploma) tDiploma = t.leiNome;
                tParagrafo = t.tipificacaoCompleta || t.categoria || null;
                break;
              }
            }
          }
          
          let arrInc = (incNum && incNum !== '-') ? incNum.split(',') : [];
          let incisosHTML = '';
          
          if (arrInc.length > 0) {
             let incLista = '';
             arrInc.forEach(inc => {
                let iClean = limparNum(inc);
                if (!iClean) return;
                let iDesc = null;
                for (var i=0; i<_tabLeis.length; i++) {
                   var t = _tabLeis[i];
                   if (limparNum(t.numeroLei) === leiL && limparNum(t.artigo) === artL && limparNum(t.inciso) === iClean) {
                       iDesc = t.tipificacaoCompleta || t.categoria || null;
                       break;
                   }
                }
                if (iDesc) {
                   incLista += '<div style="display:flex; align-items:center; justify-content:center; gap: 8px; font-size: 11px; color: var(--text-secondary); margin-bottom:4px;">' + 
                     '<div style="background: rgba(var(--danger-rgb, 255,59,48), 0.1); border: 1px solid var(--danger, #ff3b30); border-radius: 6px; padding: 2px 6px; color: var(--danger, #ff3b30); font-weight:800;">' + inc.trim() + '</div>' + 
                     '<span>' + (iDesc) + '</span></div>';
                } else {
                   incLista += '<div style="display:flex; align-items:center; justify-content:center; gap: 8px; font-size: 11px; color: var(--text-secondary); margin-bottom:4px;">' + 
                     '<div style="background: rgba(var(--danger-rgb, 255,59,48), 0.1); border: 1px solid var(--danger, #ff3b30); border-radius: 6px; padding: 2px 6px; color: var(--danger, #ff3b30); font-weight:800;">' + inc.trim() + '</div>' + 
                     '<span>⚠ Não cadastrado na aba Leis (Lei ' + (leiNum) + ', Art. ' + (artNum) + ', Inc. ' + (inc.trim()) + ')</span></div>';
                }
             });
             
             incisosHTML = '<div style="background: rgba(255,59,48, 0.08); border: 1px solid rgba(255,59,48, 0.2); border-radius: 12px; padding: 12px; text-align:center; margin-top:8px;">' +
                           '<div style="font-size: 11px; font-weight: 800; color: #ff3b30; text-transform: uppercase; margin-bottom: 8px;">' +
                           '⚖ INCISOS APLICADOS (' + arrInc.length + ')</div>' + incLista + '</div>';
          }
          
          let tDiplomaText = tDiploma ? (tDiploma).toUpperCase() : (leiNum && leiNum !== '-' ? 'LEI ' + (leiNum) : 'LEI NÃO ESPECIFICADA');
          let boxMainHtml = '';
          
          if (artNum && artNum !== '-') {
             boxMainHtml = '<div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; margin-top: 10px; text-align:center;">' +
               '<div style="font-weight: 800; font-size: 11px; color: var(--text-primary); text-transform: uppercase;">📖 ART. ' + (artNum) + ' — ' + tDiplomaText + '</div>' +
               '<div style="font-weight: 700; font-size: 13px; color: var(--text-primary); margin: 6px 0;">' + (tArtigo ? (tArtigo) : crInfo.nome) + '</div>' +
               (tParagrafo ? '<div style="font-size: 11px; color: ' + crInfo.cor + '; font-weight: 700;">' + (parNum) + ': ' + (tParagrafo) + '</div>' : '') +
               '</div>';
          }
          
          return boxMainHtml + incisosHTML;
      })(lei, artigo, paragrafo, inciso, crInfo);

      htmlTipificacoes += '<div class="proc-tipificacao-box" style="border-left-color:' + crInfo.cor + '; margin-top:8px; padding-bottom:12px;">' +
        '<div style="text-align:center; margin-bottom: 12px;">' +
        '<strong><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;margin-right:4px;color:' + crInfo.cor + ';">gavel</span> TIPIFICAÇÃO PENAL' + (blocosLeis.length > 1 ? ' ' + (idx+1) : '') + '</strong>' +
        '<br><span style="font-size:11px;color:var(--text-muted);">Lei: ' + lei + ' | Art: ' + artigo + ' | Par: ' + paragrafo + ' | Inc: ' + inciso + '</span>' +
        '</div>' +
        stylizedTipificacao +
        '</div>';
    });

    let pena = extP(infoRaw, 'Pena restante:');
    if (!isValido(pena)) pena = extP(infoRaw, 'Prazo Mínimo da Internação:');
    if (!isValido(pena)) pena = "-";
    let regime = extP(infoRaw, 'Regime Prisional:');

    let htmlSintese = '';
    if (isValido(extras.sintese)) {
      htmlSintese = '<div style="margin-top:12px;padding:12px;background:var(--bg-deep);box-shadow:var(--neu-pressed-sm);border-radius:8px;font-size:11px;color:var(--text-secondary);line-height:1.5;"><strong style="color:var(--danger);display:flex;align-items:center;gap:4px;margin-bottom:4px;"><span class="material-symbols-outlined" style="font-size:14px;">description</span> SÍNTESE</strong>' + escapeHTML(extras.sintese) + '</div>';
    }

    // Bloco de Área (CPI/BPM/CIA/DP) para o endereço principal
    let htmlArea = '';
    if (alvo.cpi || alvo.bpmArea || alvo.ciaArea || alvo.dpArea) {
      if (alvo.cpi === "FORA DO ESTADO") {
        htmlArea = '<div style="display:flex;margin-top:8px;"><span style="font-size:10px;font-weight:800;color:var(--danger);padding:4px 10px;background:rgba(255,59,48,0.15);border-radius:4px;border:1px solid rgba(255,59,48,0.3);">FORA DO ESTADO</span></div>';
      } else {
        htmlArea = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding:8px 10px;background:var(--bg-depressed);border-radius:8px;border-left:3px solid var(--brand-red);">';
        if (alvo.cpi) htmlArea += '<span style="font-size:10px;font-weight:800;color:var(--brand-red);padding:4px 8px;background:rgba(169,32,32,0.12);border-radius:4px;border:1px solid var(--brand-red);">COMANDO: ' + alvo.cpi + '</span>';
        if (alvo.bpmArea) htmlArea += '<span style="font-size:10px;font-weight:700;color:var(--text-primary);padding:4px 8px;background:rgba(255,255,255,0.08);border-radius:4px;border:1px solid rgba(255,255,255,0.2);">BTL: ' + alvo.bpmArea + '</span>';
        if (alvo.ciaArea) htmlArea += '<span style="font-size:10px;font-weight:700;color:var(--text-primary);padding:4px 8px;background:rgba(255,255,255,0.08);border-radius:4px;border:1px solid rgba(255,255,255,0.2);">CIA: ' + alvo.ciaArea + '</span>';
        if (alvo.dpArea) htmlArea += '<span style="font-size:10px;font-weight:700;color:var(--text-secondary);padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:4px;border:1px solid rgba(255,255,255,0.1);">DP: ' + alvo.dpArea + '</span>';
        if (alvo.cidade) htmlArea += '<span style="font-size:10px;font-weight:700;color:var(--text-muted);padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:4px;border:1px solid rgba(255,255,255,0.1);"><span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle;">location_city</span> ' + alvo.cidade + '</span>';
        htmlArea += '</div>';
      }
    }

    let tituloDisplay = alvo.tipoMandado || extras.titulo || "MANDADO DE PRISÃO";
    let dataSistemaDisplay = alvo.data || "N/A";
    let dataBnmpDisplay = alvo.dataBNMP || extras.emissao || "N/A";
    
    // Tentado e Doméstica
    let condicaoCrimeEspecial = '';
    let isDomestica = infoRaw.toUpperCase().includes('VIOLÊNCIA DOMÉSTICA: SIM') || (extras.violenciaDomestica === true);
    let isTentado = infoRaw.toUpperCase().includes('TENTADO: SIM');
    if (isDomestica) condicaoCrimeEspecial += '<span style="background:var(--warning);color:#1a1a1a;padding:4px 8px;border-radius:4px;font-weight:900;font-size:10px;">V. DOMÉSTICA</span>';
    if (isTentado) condicaoCrimeEspecial += '<span style="background:#dc2626;color:white;padding:4px 8px;border-radius:4px;font-weight:900;font-size:10px;">TENTADO</span>';
    if (condicaoCrimeEspecial) condicaoCrimeEspecial = '<div style="display:flex;gap:8px;justify-content:center;margin-top:8px;">' + condicaoCrimeEspecial + '</div>';

    let chkProcurado = (!alvo.status || alvo.status.toUpperCase() !== 'CAPTURADO') ? 'checked' : '';
    let chkCapturado = (alvo.status && alvo.status.toUpperCase() === 'CAPTURADO') ? 'checked' : '';

    let statusBadge = chkCapturado 
        ? '<div style="font-size:16px;font-weight:900;letter-spacing:2px;color:#1a9c54;text-align:center;margin-bottom:12px;margin-top:8px;"><span class="material-symbols-outlined" style="vertical-align:middle;font-size:20px;">check_circle</span> CAPTURADO</div>'
        : '<div style="font-size:16px;font-weight:900;letter-spacing:2px;color:var(--brand-red);text-align:center;margin-bottom:12px;margin-top:8px;"><span class="material-symbols-outlined" style="vertical-align:middle;font-size:20px;">warning</span> PROCURADO</div>';

    return '<div class="card-container card-container--highlight" style="--card-highlight-color:' + crimeInfo.cor + ';">' +

  /* ================================================================
     MÓDULO 6: CLASSIFICAÇÃO DE CRIMES (SVG ICONS)
     ================================================================ */
  function classificarCrime(infoProc) {
    let texto = (infoProc || '').toUpperCase();
    texto = texto.replace(/VIOL[ÊE]NCIA DOM[É|E]STICA:\s*(?:N\/?A|NÃO|NAO|-)/g, '');
    const isValido = function(val) { if (!val) return false; return !["", "-", "N/A", "NÃO INFORMADO"].includes(val.trim().toUpperCase()); };

    function gerarSvgTexto(label) {
      var tam = 9;
      if (label.length <= 2) tam = 12;
      else if (label.length <= 3) tam = 10;
      else if (label.length <= 4) tam = 8.5;
      else if (label.length <= 5) tam = 7.5;
      else tam = 6.5;
      return '<text x="8" y="11.5" text-anchor="middle" font-size="' + tam + '" font-weight="900" font-family="Impact,Arial Black,sans-serif" fill="white" letter-spacing="0.3">' + label + '</text>';
    }

    // Helper: Extrair de infoProc
    const extP = function(txt, lbl) { const r = new RegExp(lbl + '\\s*([^|\\n]+)', 'i'); const m = txt.match(r); return m ? m[1].trim() : "N/A"; };
    var leiExtr = extP(infoProc, 'Lei:'); var artExtr = extP(infoProc, 'Artigo:'); 
    var parExtr = extP(infoProc, 'Parágrafo:'); var incExtr = extP(infoProc, 'Inciso:');
    var espExtr = extP(infoProc, 'Espécie(?: de| da) (?:prisão|Internação):');
    if (espExtr === "N/A") espExtr = extP(infoProc, 'Espécie de prisão:');

    // Limpar Artigo se estiver sujo com §
    if (leiExtr !== "N/A" && leiExtr.toLowerCase().includes("art")) {
      let mA = leiExtr.match(/art\.?\s*([^,§|]+)/i); if (mA && !isValido(artExtr)) artExtr = mA[1].trim();
      leiExtr = leiExtr.split(/(?:,|\s)\s*art\.?/i)[0].trim();
    }
    // Pós-processamento: detectar incisos embutidos no parágrafo (dados legados como "§ 2º, I")
    if (isValido(parExtr) && (!isValido(incExtr) || incExtr === 'N/A')) {
      var _mInc = parExtr.match(/^(§\s*\d+[ºª°]?(?:-[A-Z])?)[\s,]+([IVXLCDM]{1,5}(?:\s*,\s*[IVXLCDM]{1,5})*)$/);
      if (_mInc) {
        parExtr = _mInc[1].trim();
        incExtr = _mInc[2].trim();
      }
    }

    // Helper: Romar numerais
    function expandirIncisos(textoInciso) {
      if (!isValido(textoInciso)) return [];
      var txt = textoInciso.toUpperCase().replace(/\./g, '').replace(/º/g, '');
      var tokens = txt.split(/[\s,;e]+/);
      var romanos = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV"];
      var idxMap = {};
      for(var i=0; i<romanos.length; i++) idxMap[romanos[i]] = i;
      var expandidos = [];
      var iToken = 0;
      while(iToken < tokens.length) {
        if(tokens[iToken] === "A" || tokens[iToken] === "AO") {
          if(iToken > 0 && iToken + 1 < tokens.length) {
            var start = tokens[iToken-1]; var end = tokens[iToken+1];
            if(idxMap[start] !== undefined && idxMap[end] !== undefined) {
               var sIdx = idxMap[start]; var eIdx = idxMap[end];
               if(sIdx < eIdx) { for(var j = sIdx + 1; j <= eIdx; j++) expandidos.push(romanos[j]); }
            }
          }
          iToken++;
        } else {
          if(idxMap[tokens[iToken]] !== undefined) expandidos.push(tokens[iToken]);
          iToken++;
        }
      }
      return expandidos;
    }

    var incisosExtraidos = expandirIncisos(incExtr);

    // 1. Tentar match pela tabela de leis do banco
    if (window._tabelaLeis && window._tabelaLeis.length > 0) {
      // Helper: limpar número (remove pontos, espaços, traços não-semânticos)
      var limparNum = function(v) { return (v || '').replace(/\./g, '').replace(/\s/g, '').trim(); };
      
      for (var i = 0; i < window._tabelaLeis.length; i++) {
        var lei = window._tabelaLeis[i];
        var categUp = (lei.categoria || '').toUpperCase();
        var ptUp = (lei.pinoTexto || '').toUpperCase();
        var pt = (lei.pinoTexto || categUp.substring(0, 5)).toUpperCase();
        
        // 1A. Regra especial: Prisão Civil / Pensão alimentícia
        if (categUp === "PENSÃO" || ptUp === "PENSÃO" || categUp === "CIVIL") {
           if (espExtr.toUpperCase().includes("CIVIL") || espExtr.toUpperCase().includes("CÍVEL") || espExtr.toUpperCase().includes("ALIMENTO")) {
              return { nome: lei.categoria, cor: lei.cor || '#2563eb', pinoTexto: pt, svgPath: gerarSvgTexto(pt), tipificacaoCompleta: lei.tipificacaoCompleta, naoClassificado: false };
           }
        }

        // 1B. Match estruturado por Lei + Artigo (+ Par + Inciso)
        var leiNum = limparNum(lei.numeroLei);
        var leiExtrNum = limparNum(leiExtr);
        var artLimpo = limparNum(lei.artigo);
        var artExtrLimpo = limparNum(artExtr);
        
        if (leiNum && artLimpo && leiExtrNum && artExtrLimpo) {
           // Match de Lei: comparação numérica limpa (2848 === 2848)
           var mLei = leiExtrNum === leiNum || leiExtrNum.includes(leiNum) || leiNum.includes(leiExtrNum);
           // Match de Artigo: comparação exata ou com sufixo (-A, etc.)
           var mArt = artExtrLimpo === artLimpo || artExtr.replace(/\s/g,'') === lei.artigo.replace(/\s/g,'');
           
           if (mLei && mArt) {
              // Verifica parágrafo (se a tabela exige parágrafo específico)
              var mPar = true;
              if (isValido(lei.paragrafo)) {
                 if (lei.paragrafo.toUpperCase() === "CAPUT") {
                    mPar = !isValido(parExtr) || parExtr.toUpperCase().includes("CAPUT");
                 } else {
                    var parTabLimpo = limparNum(lei.paragrafo);
                    mPar = isValido(parExtr) && (parExtr.includes(lei.paragrafo) || parExtr.includes("§" + parTabLimpo) || parExtr.includes("§ " + parTabLimpo) || limparNum(parExtr.replace(/[§ºª°]/g,'')).includes(parTabLimpo));
                 }
              }
              // Verifica inciso (se a tabela exige inciso específico)
              var mInc = true;
              if (isValido(lei.inciso)) {
                 mInc = incisosExtraidos.includes(lei.inciso.toUpperCase()) || (isValido(incExtr) && incExtr.toUpperCase().includes(lei.inciso.toUpperCase()));
              }
              
              if (mPar && mInc) {
                 return { nome: lei.categoria, cor: lei.cor || '#6b7280', pinoTexto: pt, svgPath: gerarSvgTexto(pt), tipificacaoCompleta: lei.tipificacaoCompleta, naoClassificado: false };
              }
           }
        }

        // 1C. Match legado por Palavras-Chave
        if (lei.palavrasChave) {
          var keywords = lei.palavrasChave.toUpperCase().split('|');
          for (var k = 0; k < keywords.length; k++) {
            var kw = keywords[k].trim();
            if (kw && texto.includes(kw)) {
              return { nome: lei.categoria, cor: lei.cor || '#6b7280', pinoTexto: pt, svgPath: gerarSvgTexto(pt), tipificacaoCompleta: lei.tipificacaoCompleta, naoClassificado: false };
            }
          }
        }
      }
    }

    // 2. Fallback hardcoded caso _tabelaLeis ainda não tenha sido carregada
    var fallback = [
      { kw: ['HOMIC','121','LATROCÍNIO','LATROCINIO'], nome: 'Homicídio', cor: '#8b0000', pt: 'HOMIC' },
      { kw: ['ESTUPRO','213','217'], nome: 'Estupro', cor: '#991b1b', pt: 'JACK' },
      { kw: ['MARIA DA PENHA','VIOLÊNCIA DOMÉSTICA','VIOLENCIA DOMESTICA','11340'], nome: 'V. Doméstica', cor: '#e11d48', pt: 'PENHA' },
      { kw: ['ROUBO','157'], nome: 'Roubo', cor: '#dc2626', pt: 'ROUBO' },
      { kw: ['FURTO','155'], nome: 'Furto', cor: '#ea580c', pt: 'FURTO' },
      { kw: ['TRÁFICO','TRAFICO','DROGAS','ENTORPECENTE'], nome: 'Tráfico', cor: '#7c3aed', pt: 'TRÁF' },
      { kw: ['ESTELIONATO','171'], nome: 'Estelionato', cor: '#ca8a04', pt: '171' },
      { kw: ['RECEPTAÇÃO','RECEPTACAO','180'], nome: 'Receptação', cor: '#b45309', pt: '180' },
      { kw: ['CIVIL','ALIMENTO','PENSÃO'], nome: 'Alimentícia', cor: '#2563eb', pt: 'CIVIL' },
      { kw: ['ARMA','PORTE','POSSE','244','10826'], nome: 'Porte de Arma', cor: '#475569', pt: 'ARMA' },
      { kw: ['TRÂNSITO','TRANSITO','CTB'], nome: 'Trânsito', cor: '#0891b2', pt: 'CTB' },
      { kw: ['SEQUESTRO','CÁRCERE','148'], nome: 'Sequestro', cor: '#7f1d1d', pt: '148' },
      { kw: ['LESÃO CORPORAL','LESAO CORPORAL','129'], nome: 'Lesão Corporal', cor: '#b91c1c', pt: 'LESÃO' },
      { kw: ['ASSOCIAÇÃO','ASSOCIACAO','288'], nome: 'Organização Crim.', cor: '#4338ca', pt: '288' },
      { kw: ['AMEAÇA','AMEACA','147'], nome: 'Ameaça', cor: '#9f1239', pt: '147' },
      { kw: ['FISCAL','TRIBUTÁRIO'], nome: 'Fiscal', cor: '#059669', pt: 'FISCAL' }
    ];

    for (var f = 0; f < fallback.length; f++) {
      for (var j = 0; j < fallback[f].kw.length; j++) {
        if (texto.includes(fallback[f].kw[j])) {
          return { nome: fallback[f].nome, cor: fallback[f].cor, pinoTexto: fallback[f].pt, svgPath: gerarSvgTexto(fallback[f].pt), tipificacaoCompleta: null, naoClassificado: false };
        }
      }
    }

    // 3. Se não bateu com nada → NÃO CLASSIFICADO (alerta amarelo)
    if (texto.trim().length > 0) {
      return { nome: 'Não Classificado', cor: '#f59e0b', pinoTexto: '???', svgPath: gerarSvgTexto('???'), tipificacaoCompleta: null, naoClassificado: true };
    }
