  // ---- SIDEBAR TOGGLE ----
  function toggleSidebar() {
    if (window.innerWidth >= 768) {
      document.body.classList.toggle('desktop-open');
      setTimeout(() => { if (mapaPrincipal) google.maps.event.trigger(mapaPrincipal, 'resize'); }, 350);
    } else {
      document.body.classList.toggle('mobile-open');
      const backdrop = document.getElementById('drawerBackdrop');
      if (document.body.classList.contains('mobile-open')) {
        backdrop.style.display = 'block';
        setTimeout(() => backdrop.style.opacity = '1', 10);
      } else {
        backdrop.style.opacity = '0';
        setTimeout(() => backdrop.style.display = 'none', 300);
      }
    }
  }

  // ---- BUSCA MOBILE ----
  function toggleMobileSearch() {
    const overlay = document.getElementById('mobileSearchOverlay');
    if (overlay.style.display === 'none' || !overlay.style.display) {
      overlay.style.display = 'flex';
      setTimeout(() => overlay.style.transform = 'translateY(0)', 10);
    } else {
      overlay.style.transform = 'translateY(-100%)';
      setTimeout(() => overlay.style.display = 'none', 300);
    }
  }

  // ---- MODAL DE FILTROS AVANÇADOS ----
  function abrirModalFiltrosMobile() {
    var modal = document.getElementById('modalFiltrosMobile');
    var panel = document.getElementById('modalFiltrosMobilePanel');
    if (!modal) {
      alert("DEBUG: modalFiltrosMobile NÃO encontrado no DOM!");
      return;
    }
    
    // Popular selects dinâmicos ao abrir
    try {
      popularCPIsCPMsMobile();
      popularBatalhoesSelect();
      popularCrimesDosBancos();
      popularCIAsMobile();
    } catch(e) {
      console.error('Erro ao popular filtros:', e);
    }
    
    // 1) Remover backdrop-filter ANTES de exibir (evita bug de compositing no iframe)
    modal.style.backdropFilter = 'none';
    modal.style.webkitBackdropFilter = 'none';
    
    // 2) Exibir o modal
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
    
    // 3) Forçar reflow — OBRIGATÓRIO para o navegador repintar dentro de iframe do Apps Script
    void modal.offsetHeight;
    
    // 4) Agora aplicar backdrop-filter e animar o painel
    modal.style.backdropFilter = 'blur(8px)';
    modal.style.webkitBackdropFilter = 'blur(8px)';
    
    if (panel) {
      panel.style.transform = 'translateY(0)';
    }
  }

  function fecharModalFiltrosMobile() {
    const modal = document.getElementById('modalFiltrosMobile');
    const panel = document.getElementById('modalFiltrosMobilePanel');
    if (!modal) return;
    
    if (panel) panel.style.transform = 'translateY(100%)';
    setTimeout(() => {
      modal.style.display = 'none';
      document.body.style.overflow = '';
    }, 350);
    
    // Fechar dropdown do batalhão se estiver aberto
    const dd = document.getElementById('dropdownBatalhao');
    if (dd) dd.style.display = 'none';
  }

  function fecharModalFiltrosMobileSeClicouFora(event) {
    if (event.target === document.getElementById('modalFiltrosMobile')) {
      fecharModalFiltrosMobile();
    }
  }

  // Mutual exclusion: ao selecionar um CPI específico, desabilita CPM
  function onChangeCPI() {
    const elCPI = document.getElementById('filtroCPIMobile');
    const elCPM = document.getElementById('filtroCPMMobile');
    if (!elCPI || !elCPM) return;
    if (elCPI.value !== 'TODOS') {
      elCPM.value = 'TODOS';
      elCPM.disabled = true;
      elCPM.style.opacity = '0.4';
    } else {
      elCPM.disabled = false;
      elCPM.style.opacity = '1';
    }
  }

  // Mutual exclusion: ao selecionar um CPM específico, desabilita CPI
  function onChangeCPM() {
    const elCPI = document.getElementById('filtroCPIMobile');
    const elCPM = document.getElementById('filtroCPMMobile');
    if (!elCPI || !elCPM) return;
    if (elCPM.value !== 'TODOS') {
      elCPI.value = 'TODOS';
      elCPI.disabled = true;
      elCPI.style.opacity = '0.4';
    } else {
      elCPI.disabled = false;
      elCPI.style.opacity = '1';
    }
  }

  // Popular CPI e CPM/CPAM em select único com optgroups
  function popularCPIsCPMsMobile() {
    if (typeof dadosMandados === 'undefined' || !dadosMandados) return;
    const selectCPI = document.getElementById('filtroCPIMobile');
    if (!selectCPI) return;

    const cpisSet = new Set();
    const cpmsSet = new Set();
    dadosMandados.forEach(function(d) {
      const cpi = (d.cpiArea || '').trim();
      if (!cpi) return;
      if (/CPM|CPAM/i.test(cpi)) cpmsSet.add(cpi);
      else cpisSet.add(cpi);
    });

    const sortCpiLocal = (a, b) => {
      const isCpaA = /CPA/i.test(a);
      const isCpaB = /CPA/i.test(b);
      if (isCpaA !== isCpaB) return isCpaA ? 1 : -1;
      const numA = parseInt(a.replace(/\D/g,'')) || 0;
      const numB = parseInt(b.replace(/\D/g,'')) || 0;
      return numA !== numB ? numA - numB : a.localeCompare(b);
    };

    const valAtual = selectCPI.value;
    selectCPI.innerHTML = '<option value="TODOS">Todos os Comandos</option>';

    // Optgroup CPI (civis)
    if (cpisSet.size > 0) {
      const grpCPI = document.createElement('optgroup');
      grpCPI.label = '── CPI (Civis)';
      grpCPI.style.color = 'var(--brand-red)';
      [...cpisSet].sort(sortCpiLocal).forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        grpCPI.appendChild(opt);
      });
      selectCPI.appendChild(grpCPI);
    }

    // Optgroup CPA/CPM (militares)
    if (cpmsSet.size > 0) {
      const grpCPM = document.createElement('optgroup');
      grpCPM.label = '── CPA/CPM (Militares)';
      [...cpmsSet].sort().forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        grpCPM.appendChild(opt);
      });
      selectCPI.appendChild(grpCPM);
    }

    if ([...selectCPI.options].some(o => o.value === valAtual)) selectCPI.value = valAtual;
  }

  // Popular batalhões filtrando conforme CPI/CPA/CPM selecionado
  function popularBatalhoesSelect() {
    if (typeof dadosMandados === 'undefined' || !dadosMandados) return;
    const select = document.getElementById('filtroBatalhaoMobile');
    if (!select) return;
    const valAtual = select.value;

    // Verificar se há um CPI/CPM específico selecionado para filtrar
    const selectCPI = document.getElementById('filtroCPIMobile');
    const cpiSelecionado = selectCPI ? selectCPI.value : 'TODOS';

    const batalhoesSet = new Set();
    dadosMandados.forEach(d => {
      if (!d.batalhao) return;
      // Se filtro ativo, considerar só mandados dessa área
      if (cpiSelecionado !== 'TODOS') {
        const cpiAlvo = (d.cpiArea || '').trim();
        if (cpiAlvo !== cpiSelecionado) return;
      }
      batalhoesSet.add(d.batalhao.trim());
    });

    const ordenados = [...batalhoesSet].sort((a, b) => {
      const isBpmiA = /BPM\/I/i.test(a);
      const isBpmiB = /BPM\/I/i.test(b);
      if (isBpmiA !== isBpmiB) return isBpmiA ? -1 : 1;
      const numA = parseInt(a.replace(/\D/g,'')) || 0;
      const numB = parseInt(b.replace(/\D/g,'')) || 0;
      return numA !== numB ? numA - numB : a.localeCompare(b);
    });

    select.innerHTML = '<option value="TODOS">Todos os Batalhões</option>';
    ordenados.forEach(b => {
      const opt = document.createElement('option');
      const isBPMI = /BPM\/I/i.test(b);
      const isBPMM = /BPM\/M/i.test(b);
      const prefix = isBPMI ? '[BPMI] ' : isBPMM ? '[BPMM] ' : '';
      opt.value = b;
      opt.textContent = prefix + b;
      select.appendChild(opt);
    });
    if ([...select.options].some(o => o.value === valAtual)) select.value = valAtual;
  }



  // Popular crimes dinâmicos do banco
  function popularCrimesDosBancos() {
    const selectMobile = document.getElementById('filtroCrimeMobile');
    const selectDesktop = document.getElementById('filtroCrime');
    if (!selectMobile && !selectDesktop) return;

    const valAtualMobile = selectMobile ? selectMobile.value : 'TODOS';
    const valAtualDesktop = selectDesktop ? selectDesktop.value : 'TODOS';

    const selectCPI = document.getElementById('filtroCPIMobile');
    const cpiSelecionado = selectCPI ? selectCPI.value : 'TODOS';
    const selectBatalhao = document.getElementById('filtroBatalhaoMobile');
    const batSelecionado = selectBatalhao ? selectBatalhao.value : 'TODOS';
    const selectCIA = document.getElementById('filtroCIAMobile');
    const ciaSelecionada = selectCIA ? selectCIA.value : 'TODOS';
    const selectDP = document.getElementById('filtroDPMobile');
    const dpSelecionada = selectDP ? selectDP.value : 'TODOS';

    const crimesSet = new Set();
    
    // Apenas puxar dos mandados dinamicamente que possuem pinos no mapa
    if (typeof dadosMandados !== 'undefined' && dadosMandados && typeof classificarCrime === 'function') {
      dadosMandados.forEach(function(d) {
        if (d.status === 'Procurado' && !d.semEndereco) {
          if (cpiSelecionado !== 'TODOS' && (d.cpiArea || '').trim() !== cpiSelecionado) return;
          if (batSelecionado !== 'TODOS' && (d.batalhao || '').trim() !== batSelecionado) return;
          if (ciaSelecionada !== 'TODOS' && (d.ciaArea || '').trim() !== ciaSelecionada) return;
          if (dpSelecionada !== 'TODOS' && (d.dpArea || '').trim() !== dpSelecionada) return;
          const crime = classificarCrime(d.infoProcessuais || '').nome;
          if (crime) crimesSet.add(crime);
        }
      });
    }

    const ordenados = [...crimesSet].sort();
    
    const popularSelect = (sel, valAtual) => {
      if (!sel) return;
      sel.innerHTML = '<option value="TODOS">Todos os crimes</option>';
      ordenados.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });
      if ([...sel.options].some(o => o.value === valAtual)) sel.value = valAtual;
    };

    popularSelect(selectMobile, valAtualMobile);
    popularSelect(selectDesktop, valAtualDesktop);
  }

  // Extrai campo do infoProcessuais
  function extrairInfo(infoProc, label) {
    if (!infoProc) return null;
    const regex = new RegExp(label + '\\s*([^|\\n]+)', 'i');
    const match = infoProc.match(regex);
    if (match) {
      const val = match[1].trim();
      if (!["", "-", "N/A", "NÃO INFORMADO"].includes(val.toUpperCase())) return val;
    }
    return null;
  }

  function preencherSubFiltroMobile(idSelect, labelExtracao, defaultText, selectCrimeId, selectArtigoId, selectParagrafoId) {
    if (!window.dadosMandados) return;
    const select = document.getElementById(idSelect);
    if (!select) return;
    const valAtual = select.value;

    const filtroCrime = document.getElementById(selectCrimeId);
    const crimeSel = filtroCrime ? filtroCrime.value : 'TODOS';
    
    const filtroArtigo = selectArtigoId ? document.getElementById(selectArtigoId) : null;
    const artSel = filtroArtigo ? filtroArtigo.value : 'TODOS';
    
    const filtroParagrafo = selectParagrafoId ? document.getElementById(selectParagrafoId) : null;
    const parSel = filtroParagrafo ? filtroParagrafo.value : 'TODOS';

    const valoresSet = new Set();

    dadosMandados.forEach(function(d) {
      if (d.status !== 'Procurado' || d.semEndereco) return;
      
      const infoProc = d.infoProcessuais || '';
      if (crimeSel !== 'TODOS') {
        const crimeData = typeof classificarCrime === 'function' ? classificarCrime(infoProc) : {nome:''};
        if (crimeData.nome !== crimeSel) return;
      }
      
      if (artSel !== 'TODOS') {
        const a = extrairInfo(infoProc, 'Artigo:');
        if (!a || a !== artSel) return;
      }
      
      if (parSel !== 'TODOS') {
        const p = extrairInfo(infoProc, 'Parágrafo:');
        if (!p || p !== parSel) return;
      }

      const valor = extrairInfo(infoProc, labelExtracao);
      if (valor) valoresSet.add(valor);
    });

    select.innerHTML = '<option value="TODOS">' + defaultText + '</option>';
    [...valoresSet].sort().forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      select.appendChild(opt);
    });
    if ([...select.options].some(o => o.value === valAtual)) select.value = valAtual;
  }

  function popularArtigoMobile() { preencherSubFiltroMobile('filtroArtigoMobile', 'Artigo:', 'Todos', 'filtroCrimeMobile'); }
  function popularParagrafoMobile() { preencherSubFiltroMobile('filtroParagrafoMobile', 'Parágrafo:', 'Todos', 'filtroCrimeMobile', 'filtroArtigoMobile'); }
  function popularIncisoMobile() { preencherSubFiltroMobile('filtroIncisoMobile', 'Inciso:', 'Todos', 'filtroCrimeMobile', 'filtroArtigoMobile', 'filtroParagrafoMobile'); }

  // Chips de validade (≤N dias)
  function selecionarChipValidade(btn) {
    const chips = document.querySelectorAll('.chip-validade');
    chips.forEach(c => {
      c.style.background = 'rgba(255,255,255,0.03)';
      c.style.borderColor = 'rgba(255,255,255,0.1)';
      c.style.color = 'var(--text-secondary)';
    });
    btn.style.background = 'rgba(169,32,32,0.25)';
    btn.style.borderColor = 'rgba(169,32,32,0.7)';
    btn.style.color = '#ffffff';
    const dias = btn.getAttribute('data-dias');
    const hidden = document.getElementById('filtroValidadeDias');
    if (hidden) hidden.value = dias;
    filtrarNoMapaMobile();
    atualizarBadgeFiltros();
  }

  // Atualiza o badge de filtros ativos
  function atualizarBadgeFiltros() {
    const badge = document.getElementById('badgeFiltrosAtivos');
    if (!badge) return;
    let count = 0;
    const ids = ['filtroCPIMobile','filtroBatalhaoMobile','filtroCIAMobile','filtroDPMobile','filtroCrimeMobile','filtroArtigoMobile','filtroParagrafoMobile','filtroIncisoMobile','filtroSexoMobile','filtroTipoMandadoMobile'];
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el && el.value !== 'TODOS' && el.value !== '') count++;
    });
    const vDias = (document.getElementById('filtroValidadeDias') || {}).value || '';
    if (vDias) count++;
    badge.textContent = count;
    badge.style.display = count > 0 ? 'inline-block' : 'none';
    // Destacar botão de filtro principal
    const btn = document.getElementById('btnToggleFiltrosMobile');
    if (btn) btn.style.background = count > 0 ? 'rgba(169,32,32,0.5)' : 'rgba(169,32,32,0.2)';
  }

  // Limpar todos os filtros
  function limparTodosFiltrosMobile() {
    ['filtroCPIMobile','filtroCIAMobile','filtroDPMobile','filtroCrimeMobile','filtroArtigoMobile','filtroParagrafoMobile','filtroIncisoMobile','filtroSexoMobile','filtroTipoMandadoMobile','filtroBatalhaoMobile'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.value = 'TODOS'; el.disabled = false; el.style.opacity = '1'; }
    });
    const vDias = document.getElementById('filtroValidadeDias');
    if (vDias) vDias.value = '';
    // Resetar chips
    const chips = document.querySelectorAll('.chip-validade');
    chips.forEach((c, i) => {
      c.style.background = i === 0 ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.03)';
      c.style.borderColor = i === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.1)';
      c.style.color = 'var(--text-secondary)';
    });
    atualizarBadgeFiltros();
    filtrarNoMapaMobile();
  }

  // ---- TOGGLE FILTROS RETRÁTEIS DA LISTA ----
  window.toggleFiltrosListaRetrateis = function() {
    const container = document.getElementById('filtrosListaRetrateis');
    const btn = document.getElementById('btnToggleFiltrosLista');
    if (!container) return;
    const arrow = btn ? btn.querySelector('.filtros-arrow') : null;
    
    if (container.style.display === 'none' || !container.style.display) {
      container.style.display = 'block';
      requestAnimationFrame(() => {
        container.style.maxHeight = '300px';
        container.style.opacity = '1';
      });
      if (arrow) arrow.style.transform = 'rotate(180deg)';
      if (btn) btn.style.borderColor = '#fbbf24';
    } else {
      container.style.maxHeight = '0';
      container.style.opacity = '0';
      setTimeout(() => { container.style.display = 'none'; }, 400);
      if (arrow) arrow.style.transform = 'rotate(0deg)';
      if (btn) btn.style.borderColor = '#334155';
    }
  };

  function filtrarNoMapaMobile() {
    const termoBusca = (document.getElementById('filtroNomeMobile') || {}).value || '';
    document.getElementById('filtroNome').value = termoBusca;
    
    // Sincroniza os filtros do modal mobile com os filtros globais (Desktop)
    const syncFiltro = (idMobile, idDesktop) => {
      const elMobile = document.getElementById(idMobile);
      const elDesktop = document.getElementById(idDesktop);
      if (elMobile && elDesktop) elDesktop.value = elMobile.value;
    };

    // Select unificado CPI/CPM: detectar se valor selecionado é CPM/CPAM
    const elCPIUnif = document.getElementById('filtroCPIMobile');
    const valUnif = elCPIUnif ? elCPIUnif.value : 'TODOS';
    const isCPM = /CPM|CPAM/i.test(valUnif);

    const elDesktopCPI = document.getElementById('filtroCPI');
    const elDesktopCPM = document.getElementById('filtroCPMMobile'); // select oculto de compat
    if (isCPM && valUnif !== 'TODOS') {
      // Valor é CPM/CPAM → zerar CPI desktop e preencher CPM
      if (elDesktopCPI) elDesktopCPI.value = 'TODOS';
      if (elDesktopCPM) elDesktopCPM.value = valUnif;
      // Sync filtro auth (filtroCPMMobile → filtrarNoMapa usa filtroCPMMobile diretamente)
    } else {
      // Valor é CPI ou TODOS
      if (elDesktopCPI) elDesktopCPI.value = valUnif;
      if (elDesktopCPM) elDesktopCPM.value = 'TODOS';
    }

    syncFiltro('filtroBatalhaoMobile', 'filtroBatalhao');
    syncFiltro('filtroCIAMobile', 'filtroCIA');

  // ========== FILTROS DA LISTA ==========
  function aplicarFiltrosLista() {
    var buscaRapida = document.getElementById('buscaRapidaLista');
    var termo = (buscaRapida ? buscaRapida.value : '').toLowerCase();
    var filtroStatus = document.getElementById('filtroStatusLista');
    var statusVal = filtroStatus ? filtroStatus.value : 'TODOS';
    var ordenacao = document.getElementById('ordenacaoLista');
    var ordemVal = ordenacao ? ordenacao.value : 'RECENTES';
    
    var filtrados = dadosMandados.filter(function(d) {
      // Filtro de status
      if (statusVal !== 'TODOS' && d.status !== statusVal) return false;
      
      // Filtro de busca
      if (!termo) return true;
      
      var nome = (d.nome || '').toLowerCase();
      var cpf = (d.cpf || '').toLowerCase();
      var alcunha = '';
      if (d.extras && d.extras.alcunha) alcunha = d.extras.alcunha.toLowerCase();
      else if (d.alcunha) alcunha = d.alcunha.toLowerCase();
      var mandado = (d.mandado || '').toLowerCase();
      
      return nome.includes(termo) || cpf.includes(termo) || alcunha.includes(termo) || mandado.includes(termo);
    });
    
    // Ordenação
    if (ordemVal === 'NOME') {
      filtrados.sort(function(a, b) {
        return (a.nome || '').localeCompare(b.nome || '');
      });
    } else if (ordemVal === 'DISTANCIA') {
      ordenarPorDistanciaERenderizar(filtrados);
      return;
    } else {
      // RECENTES (padrão)
      filtrados.sort(function(a, b) {
        return b.idLinha - a.idLinha;
      });
    }
    
    renderizarTabelaMandados(filtrados);
  }

  // ========== ORDENAÇÃO POR DISTÂNCIA ==========
  function ordenarPorDistanciaERenderizar(dados) {
    if (!navigator.geolocation) {
      chamarAlertaTatico("ERRO GPS", "Seu navegador não suporta geolocalização.", "OK");
      renderizarTabelaMandados(dados);
      document.getElementById('ordenacaoLista').value = "RECENTES";
      return;
    }
    
    // Mostra loading rápido
    var trackEl = document.getElementById('accordionListTrack') || document.getElementById('tabelaMandados');
    if (trackEl) {
      trackEl.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);"><span class="material-symbols-outlined" style="font-size:40px;animation:spin 1s linear infinite;">sync</span><p style="font-size:13px;margin-top:8px;">Obtendo localização para calcular rotas...</p></div>';
    }

    navigator.geolocation.getCurrentPosition(function(position) {
      var latAtual = position.coords.latitude;
      var lngAtual = position.coords.longitude;
      
      dados.forEach(function(d) {
        if (!d.semEndereco && d.lat && d.lng) {
          d._distanciaKm = calcularDistanciaHaversine(latAtual, lngAtual, d.lat, d.lng);
        } else {
          d._distanciaKm = 99999; // Sem endereço fica no fim
        }
      });
      
      dados.sort(function(a, b) { return a._distanciaKm - b._distanciaKm; });
      renderizarTabelaMandados(dados);
      
    }, function(error) {
      chamarAlertaTatico("ERRO GPS", "Não foi possível obter sua localização. Permita o acesso ao GPS.", "OK");
      renderizarTabelaMandados(dados);
      document.getElementById('ordenacaoLista').value = "RECENTES";
    });
  }

  function calcularDistanciaHaversine(lat1, lon1, lat2, lon2) {
    var R = 6371; // Raio da Terra em km
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

    function sortCpi(a, b) {
      let isCpaA = a.includes('CPA');
      let isCpaB = b.includes('CPA');
      if (isCpaA !== isCpaB) return isCpaA ? 1 : -1;
      let numA = parseInt(a.replace(/\D/g, '')) || 0;
      let numB = parseInt(b.replace(/\D/g, '')) || 0;
      if (numA !== numB) return numA - numB;
      return a.localeCompare(b);
    }

    function sortBpm(a, b) {
      let isBpmiA = a.includes('BPM/I');
      let isBpmiB = b.includes('BPM/I');
      if (isBpmiA !== isBpmiB) return isBpmiA ? -1 : 1;
      let numA = parseInt(a.replace(/\D/g, '')) || 0;
      let numB = parseInt(b.replace(/\D/g, '')) || 0;
      if (numA !== numB) return numA - numB;
      return a.localeCompare(b);
    }

      var elEspecie = document.getElementById('editEspeciePrisao'); if (elEspecie) elEspecie.value = mEspecie ? mEspecie[1].trim() : '';
      var elLei = document.getElementById('editLei'); if (elLei) elLei.value = mLei ? mLei[1].trim() : '';
      var elArtigo = document.getElementById('editArtigo'); if (elArtigo) elArtigo.value = mArtigo ? mArtigo[1].trim() : '';

      var elInciso = document.getElementById('editInciso'); if (elInciso) elInciso.value = mInciso ? mInciso[1].trim() : '';
      var elPena = document.getElementById('editPenaRestante'); if (elPena) elPena.value = mPena ? mPena[1].trim() : '';
      var elRegime = document.getElementById('editRegime'); if (elRegime) elRegime.value = mRegime ? mRegime[1].trim() : '';
      var elMotivo = document.getElementById('editMotivo'); if (elMotivo) elMotivo.value = mMotivo ? mMotivo[1].trim() : '';
      var elTentado = document.getElementById('editCrimeTentado'); if (elTentado) elTentado.value = mTentado ? mTentado[1].trim() : '';
      var elVd = document.getElementById('editViolenciaDom'); if (elVd) elVd.value = mVd ? mVd[1].trim() : '';
      
      var elInfo = document.getElementById('editInfoProcessuais'); if (elInfo) elInfo.value = d.infoProcessuais || '';

      // Foto Editada resetada
      fotoBase64Editada = "";
      var elImg = document.getElementById('edit-preview-foto-admin');
      var elTxt = document.getElementById('edit-foto-texto-upload');
      if (elImg) { elImg.src = ""; elImg.style.display = 'none'; }
      if (elTxt) { elTxt.style.display = 'flex'; }

      // Limpar e popular múltiplos endereços
      var containerEnds = document.getElementById('containerMultiEnderecos');
      if (containerEnds) {
        containerEnds.innerHTML = '';
        var txtOutros = (origem === "BD") ? d.outrosEnderecos : d.secundariosText;
        if (txtOutros) {
          var arr = txtOutros.split('||').map(function(s){return s.trim();}).filter(function(s){return s;});
          if (arr.length === 0) {
            arr = txtOutros.split('\n').map(function(s){return s.trim();}).filter(function(s){return s;});
          }
          arr.forEach(function(end) { adicionarCampoEnderecoEdit(end); });
        }
      }

      var modal = document.getElementById('modalEditarMandado');
      if (modal && modal.parentElement !== document.body) {
        document.body.appendChild(modal);
      }
      if (modal) modal.style.display = 'flex';
    } catch(erroEdit) {
      alert("Erro ao abrir janela de edição: " + erroEdit.message);
    }
  }

  // ========== LÓGICA DO GRID DE REVISÃO DA FILA ==========
  function toggleSelecaoFila(index) {
    var cb = document.getElementById('cb-fila-' + index);
    if (!cb) return;
    cb.checked = !cb.checked;
    
    var card = document.getElementById('card-fila-' + index);
    var status = document.getElementById('status-importacao-' + index);
    if (cb.checked) {
      if(card) { card.classList.add('selecionado'); card.classList.remove('descartado'); }
      if(status) { status.innerText = 'Será Importado'; status.style.color = 'var(--success)'; }
    } else {
      if(card) { card.classList.add('descartado'); card.classList.remove('selecionado'); }
      if(status) { status.innerText = 'Descartado'; status.style.color = 'var(--danger)'; }
    }
    
    // Atualizar cálculo dinâmico da fila
    var totalSelecionados = document.querySelectorAll('.cb-importar-fila:checked').length;
    var btn = document.getElementById('btnConfirmarFila');
    if (btn) {
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;vertical-align:middle;">cloud_upload</span> CONFIRMAR IMPORTAÇÃO (' + totalSelecionados + ')';
      if (totalSelecionados === 0) {
        btn.style.opacity = '0.5';
        btn.style.pointerEvents = 'none';
      } else {
        btn.style.opacity = '1';
        btn.style.pointerEvents = 'auto';
      }
    }
  }

  async function confirmarImportacaoFila() {
    var checkboxes = document.querySelectorAll('.cb-importar-fila:checked');
    if (checkboxes.length === 0) {
      return chamarAlertaTatico("ATENÇÃO", "Selecione ao menos um mandado na lista para importar.", "OK");
    }

    var indicesParaImportar = Array.from(checkboxes).map(function(cb) { return parseInt(cb.getAttribute('data-index')); });
    var loteFiltrado = filaImportacao.filter(function(item, idx) { return indicesParaImportar.includes(idx); });

    const overlay = document.getElementById('loadingOverlayIA');
    const overlayTitulo = document.getElementById('overlayIATitulo');
    const overlaySub = document.getElementById('overlayIASub');
    const overlayBarra = document.getElementById('overlayIABarra');
    const overlayPercent = document.getElementById('overlayIAPercent');

    if (overlay) {
      overlayTitulo.innerText = "Importando Alvo(s)";
      overlaySub.innerHTML = "Gravando mandados de prisão na planilha do banco de dados...";
      overlayBarra.style.width = "75%";
      overlayPercent.innerText = "75%";
      overlay.style.display = 'flex';
    }

    var btn = document.getElementById('btnConfirmarFila');
    btn.innerText = 'SALVANDO ARQUIVOS...';
    btn.disabled = true;

    var geocoder = null;
    if (typeof google !== 'undefined' && google.maps && google.maps.Geocoder) {
      geocoder = new google.maps.Geocoder();
    }

    for (var i = 0; i < loteFiltrado.length; i++) {
      var item = loteFiltrado[i];
      
      // Geocodificação do Endereço Principal (se o geocoder estiver disponível)
      item.latPrincipal = null;
      item.lngPrincipal = null;
      item.ufPrincipal = "";
      
      if (geocoder && item.enderecoPrincipal && item.enderecoPrincipal !== "Não informado" && item.enderecoPrincipal !== "N/A") {
        try {
          var geoMain = await geocodeEndereco(geocoder, item.enderecoPrincipal);
          if (geoMain) {
            item.latPrincipal = geoMain.lat;
            item.lngPrincipal = geoMain.lng;
            item.ufPrincipal = geoMain.uf;
          }
        } catch(e) { console.warn("Erro ao geocodificar principal", e); }
      }

      var secArray = [];
      if (item.secundariosText) {
        var a = item.secundariosText.split('||');
        for (var j = 0; j < a.length; j++) {
          var x = a[j].trim();
          if (x) {
            var geoSec = null;
            if (geocoder) {
              try {
                geoSec = await geocodeEndereco(geocoder, x);
              } catch(e) { console.warn("Erro ao geocodificar secundário", e); }
            }
            if (geoSec) {
              secArray.push({ endereco: x, lat: geoSec.lat, lng: geoSec.lng, uf: geoSec.uf });
            } else {
              secArray.push({ endereco: x, lat: null, lng: null, uf: "" });
            }
          }
        }
      }
      item.secundarios = secArray;
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (overlay) overlay.style.display = 'none';
        btn.disabled = false;
        if(res.sucesso) {
          document.getElementById('view-revisao-importacao').style.display = 'none';
          var fab = document.getElementById('btnAdminNovo');
          var isAdmin = document.getElementById('sidebarPerfilEl') && document.getElementById('sidebarPerfilEl').textContent === 'Admin';
          if (fab && isAdmin) fab.style.display = 'flex';
          chamarAlertaTatico("SUCESSO", res.mensagem, "OK");
          filaImportacao = [];
          sincronizarBD();
        } else {
          chamarAlertaTatico("ERRO", res.mensagem, "OK");
          btn.innerText = 'CONFIRMAR IMPORTAÇÃO (' + filaImportacao.length + ')';
        }
      })
      .withFailureHandler(function(err) {
        if (overlay) overlay.style.display = 'none';
        btn.disabled = false;
        chamarAlertaTatico("ERRO FATAL", err.message, "OK");
        btn.innerText = 'CONFIRMAR IMPORTAÇÃO (' + filaImportacao.length + ')';
      })
      .cadastrarMandadosEmLote(loteFiltrado);
  }

  function hexToRgba(hex, alpha) {
    if (!hex || !hex.startsWith('#') || hex.length !== 7) return hex;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
  }

  function aplicarConfigsDinamicas(configs) {
    // Nome do App
    if (configs.app_nome) {
      document.getElementById('appNameEl').textContent = configs.app_nome;
      document.title = configs.app_nome + ' — Sistema Tático';
    }
    // Slogan
    if (configs.app_slogan) {
      var sloganEl = document.getElementById('appSloganEl');
      if (sloganEl) sloganEl.textContent = configs.app_slogan;
    }
    // Ícone
    if (configs.app_icone) {
      document.getElementById('appIconEl').textContent = configs.app_icone;
    }
    // Cores Premium (Com opacidade para manter o Glassmorphism)
    if (configs.cor_primaria) {
      document.documentElement.style.setProperty('--accent', configs.cor_primaria);
      document.documentElement.style.setProperty('--accent-glow', hexToRgba(configs.cor_primaria, 0.6));
    }
    if (configs.cor_fundo) {
      document.documentElement.style.setProperty('--bg-base', configs.cor_fundo);
    }
    if (configs.cor_superficie) {
      // Forçamos a cor de superfície a ter transparência (0.65) para o desfoque de vidro funcionar
      document.documentElement.style.setProperty('--bg-surface', hexToRgba(configs.cor_superficie, 0.65));
      document.documentElement.style.setProperty('--bg-depressed', hexToRgba(configs.cor_superficie, 0.4));
    }
    if (configs.cor_texto) document.documentElement.style.setProperty('--text-primary', configs.cor_texto);
    
    if (configs.app_logo_url) {
        document.getElementById('appLogoImg').src = configs.app_logo_url;
        document.getElementById('appLogoImg').style.display = 'block';
        document.getElementById('appIconEl').style.display = 'none';
    } else if (configs.app_icone) {
        document.getElementById('appLogoImg').style.display = 'none';
        document.getElementById('appIconEl').style.display = 'block';
    }
  }

  // ---- LIVE PREVIEW DE CORES ----
  function aplicarCorLivePreview(chave) {
    const cor = document.getElementById('cfg_' + chave).value;
    if (chave === 'cor_primaria') {
      document.documentElement.style.setProperty('--accent', cor);
      document.documentElement.style.setProperty('--accent-glow', hexToRgba(cor, 0.6));
    }
    if (chave === 'cor_fundo') document.documentElement.style.setProperty('--bg-base', cor);
    if (chave === 'cor_superficie') {
      document.documentElement.style.setProperty('--bg-surface', hexToRgba(cor, 0.65));
      document.documentElement.style.setProperty('--bg-depressed', hexToRgba(cor, 0.4));
    }
    if (chave === 'cor_texto') document.documentElement.style.setProperty('--text-primary', cor);
  }

  function aplicarPaletaRapida(primaria, fundo, superficie, texto) {

  function processarUploadCSV() {
    const inputCsv = document.getElementById('inputCsvBNMP');
    const file = inputCsv.files[0];
    if (!file) return;

    document.getElementById('btnProcessarCsv').disabled = true;
    document.getElementById('btnProcessarCsv').innerHTML = 'PROCESSANDO...';

    const reader = new FileReader();
    reader.onload = function(e) {
      const texto = e.target.result;
      const linhas = texto.split(/\r?\n/);
      const matriz = [];
      
      // Parser super simples para CSV
      linhas.forEach(linha => {
        if (!linha.trim()) return;
        // Ponto e vírgula ou vírgula
        const delimitador = linha.includes(';') ? ';' : ',';
        // Split ignorando delimitadores dentro de aspas
        const valores = linha.split(new RegExp(delimitador + '(?=(?:(?:[^"]*"){2})*[^"]*$)'));
        matriz.push(valores.map(v => v.replace(/^"|"$/g, '').trim()));
      });

      if (matriz.length < 2) {
        chamarAlertaTatico('ERRO', 'CSV inválido ou vazio.', 'OK');
        document.getElementById('btnProcessarCsv').disabled = false;
        document.getElementById('btnProcessarCsv').innerHTML = 'CRUZAR DADOS';
        return;
      }

      google.script.run.withSuccessHandler(function(res) {
        if (res.sucesso) {
          const msg = res.mensagem + '<br><br><b>Pela Cruzada:</b><br>- ' + res.pendentes + ' Pendentes em ambos<br>- ' + res.baixados + ' Baixados no BNMP (Não encontrados no CSV)';
          document.getElementById('resultadoConferencia').innerHTML = msg;
          document.getElementById('resultadoConferencia').style.display = 'block';
          chamarAlertaTatico('SUCESSO', res.mensagem, 'OK');
        } else {
          chamarAlertaTatico('ERRO', res.mensagem, 'OK');
        }
        document.getElementById('btnProcessarCsv').disabled = false;
        document.getElementById('btnProcessarCsv').innerHTML = 'CRUZAR DADOS';
      }).processarCruzamentoCSV(matriz);
    };
    reader.readAsText(file, "UTF-8");
  }

  // Helper: calcular dias restantes a partir de uma string dd/mm/yyyy
  function calcularDiasRestantes(dataStr) {
    if (!dataStr) return null;
    const parts = dataStr.split('/');
    if (parts.length !== 3) return null;
    const dataVal = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
    if (isNaN(dataVal.getTime())) return null;
    const hoje = new Date();
    hoje.setHours(0, 0, 0, 0);
    const diff = dataVal.getTime() - hoje.getTime();
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
  }

  // Helper: formatar dias restantes em anos, meses e dias
  function formatarDiasRestantes(dias) {
    if (dias === null || dias === undefined) return '';
    const valorAbs = Math.abs(dias);
    const anos = Math.floor(valorAbs / 365);
    const meses = Math.floor((valorAbs % 365) / 30);
    const d = valorAbs % 30;
    let parts = [];
    if (anos > 0) parts.push(anos + (anos === 1 ? ' ano' : ' anos'));
    if (meses > 0) parts.push(meses + (meses === 1 ? ' mês' : ' meses'));
    if (d > 0 || parts.length === 0) parts.push(d + (d === 1 ? ' dia' : ' dias'));
    return parts.join(', ');
  }

          atualizarCacheERenderizar('Crime classificado e keywords adicionadas à nomeclatura "' + cat + '"!');
        } else {
          chamarAlertaTatico('ERRO', r ? r.mensagem : 'Erro ao salvar.', 'OK');
        }
      }).adicionarPalavrasChaveLei(cat, novasKw);
    } else {
      chamarAlertaTatico('INFO', 'Nomeclatura selecionada: ' + cat + '. (Sem salvar novas palavras-chave)', 'OK');
    }

    fecharModalClassificarCrime();
  }

  function atualizarCacheERenderizar(msgSucesso) {
    google.script.run.withSuccessHandler(function(tabela) {

  var _chartInstances = {};

  function atualizarGraficosComFiltro() {
    var filtro = document.getElementById('filtroTemporalGraficos');
    var dias = filtro ? filtro.value : 'TODOS';
    graficosDesenhados = false;

    // Destruir gráficos anteriores
    ['graficoLancamentos', 'graficoCapturas', 'graficoCrimes', 'graficoAreas', 'graficoDemografia', 'graficoSensivel', 'graficoGeocodificacaoPrevisao'].forEach(function(id) {

  function renderizarGraficosComFiltro(diasFiltro, areaFiltro) {
    if (!dadosMandados || dadosMandados.length === 0) return;

    var hoje = new Date();
    var dadosFiltrados = dadosMandados;

    if (diasFiltro !== 'TODOS') {
      var limDias = parseInt(diasFiltro) || 9999;
      dadosFiltrados = dadosFiltrados.filter(function(d) {
        if (!d.data) return false;
        var parts = d.data.split('/');
        if (parts.length !== 3) return false;
        var dataLanc = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
        var diff = (hoje - dataLanc) / (1000 * 60 * 60 * 24);
        return diff <= limDias;
      });
    }

    if (areaFiltro && areaFiltro !== 'TODOS') {
      var tipoFiltro = areaFiltro.substring(0, 4); // "CPI:", "BPM:", "CID:"
      var valorFiltro = areaFiltro.substring(5);
      dadosFiltrados = dadosFiltrados.filter(function(d) {
        if (tipoFiltro === 'CPI:' && d.cpiArea === valorFiltro) return true;
        if (tipoFiltro === 'BPM:' && d.batalhao === valorFiltro) return true;
        if (tipoFiltro === 'CID:' && d.cidade === valorFiltro) return true;
        return false;
      });
    }

    // Stats
    var total = dadosFiltrados.length;
    var capturados = dadosFiltrados.filter(function(d) { return d.status.toUpperCase() === 'CAPTURADO'; }).length;
    var vencendo = 0, vencido = 0;

    var altoRisco = 0;

    dadosFiltrados.forEach(function(d) {
      var dias = calcularDiasRestantes(d.validade);
      if (dias !== null) {
        if (dias <= 0) vencido++;
        else if (dias <= 30) vencendo++;
      }
      
      // Checar Alto Risco (Homicídio, Roubo, Tráfico)
      var strProc = (d.infoProcessuais || '').toUpperCase();
      var strArtigo = (d.artigo || '').toUpperCase();
      if (strArtigo.includes('121') || strArtigo.includes('157') || strArtigo.includes('33') ||
          strProc.includes('HOMIC') || strProc.includes('ROUBO') || strProc.includes('TRÁFICO') || strProc.includes('TRAFICO')) {
        altoRisco++;
      }
    });

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statCaptura').textContent = capturados + ' (' + (total > 0 ? Math.round(capturados / total * 100) : 0) + '%)';
    if (document.getElementById('statAltoRisco')) document.getElementById('statAltoRisco').textContent = altoRisco;
    document.getElementById('statVencendo').textContent = vencendo;
    document.getElementById('statVencido').textContent = vencido;

    // Config Chart.js

    Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';

    // Gráfico de barras: Mandados por mês
    var meses = {};
    dadosFiltrados.forEach(function(d) {
      if (d.data) {
        var parts = d.data.split('/');
        if (parts.length === 3) {
          var chave = parts[1] + '/' + parts[2];
          meses[chave] = (meses[chave] || 0) + 1;
        }
      }

    var mesLabels = Object.keys(meses).slice(-12);
    var mesData = mesLabels.map(function(k) { return meses[k]; });

    _chartInstances['graficoLancamentos'] = new Chart(document.getElementById('graficoLancamentos'), {

      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }

    // Gráfico de capturas

      try {

        if (ex.titulo) r = ex.titulo.toUpperCase();
        if (ex.obsPdf) s += ' ' + ex.obsPdf.toUpperCase();
      } catch(e) {}
      
      if (s.includes('VIOLÊNCIA DOMÉSTICA') || s.includes('VIOLENCIA DOMESTICA') || r.includes('MARIA DA PENHA')) {

      if (r.includes('RECAPTURA') || r.includes('EVASÃO') || r.includes('FUGA') || s.includes('RECAPTURA')) {

    var countOutros = totalSensiveis - countDomestica - countRecaptura;

          var text = perc + "%", textX = Math.round((width - ctx.measureText(text).width) / 2), textY = height / 2.2;
          ctx.fillText(text, textX, textY);
          ctx.font = "800 " + (fontSize*0.3).toFixed(2) + "em Inter";
          ctx.fillStyle = "#9090a8";
          var t2 = "SENSÍVEIS";
          var tx2 = Math.round((width - ctx.measureText(t2).width) / 2);

    // ---- KPI E PREVISÃO DE GEOCODIFICAÇÃO (ADMIN & COLABORADOR ONLY) ----

    const isGestor = (perfilUsuario === 'ADMIN' || perfilUsuario === 'COLABORADOR');

    if (isGestor) {

      dadosMandados.forEach(function(d) {
        let principal = (d.enderecoPrincipal && d.enderecoPrincipal !== 'Não informado' && d.enderecoPrincipal.trim() !== '') ? 1 : 0;
        let secundarias = (d.secundarios && Array.isArray(d.secundarios)) ? d.secundarios.length : 0;
        let totalD = principal + secundarias;
        totalEnderecosSistema += totalD;

        if (d.data) {
          let parts = d.data.split('/');
          if (parts.length === 3) {
            let m = parseInt(parts[1]);
            let a = parseInt(parts[2]);
            if (m === mesAtual && a === anoAtual) {
              totalEnderecosMesAtual += totalD;
            }
          }
        }
      });

      const statEnderecosTotal = document.getElementById('statEnderecosTotal');
      if (statEnderecosTotal) statEnderecosTotal.textContent = totalEnderecosSistema.toLocaleString('pt-BR');
      
      const statEnderecosMensal = document.getElementById('statEnderecosMensal');
      if (statEnderecosMensal) {
        statEnderecosMensal.innerHTML = 'Este Mês: <b>' + totalEnderecosMesAtual.toLocaleString('pt-BR') + '</b> / ' + limiteMensal.toLocaleString('pt-BR');
        if (totalEnderecosMesAtual >= limiteMensal * 0.9) {
          statEnderecosMensal.style.color = 'var(--danger)';
        } else if (totalEnderecosMesAtual >= limiteMensal * 0.7) {
          statEnderecosMensal.style.color = 'var(--warning)';
        } else {
          statEnderecosMensal.style.color = 'var(--text-secondary)';
        }
      }

      // Agrupar por mes nos últimos 4 meses e próximos 3 meses para projeção
      const mesesNomes = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
      let chavesRealizadas = [];
      let chavesProjetadas = [];
      let labelList = [];

      for (let i = -3; i <= 0; i++) {
        let dTemp = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
        let m = dTemp.getMonth() + 1;
        let a = dTemp.getFullYear();
        let mStr = m < 10 ? '0' + m : '' + m;
        chavesRealizadas.push(mStr + '/' + a);
        labelList.push(mesesNomes[dTemp.getMonth()] + '/' + String(a).substring(2));
      }

      for (let i = 1; i <= 3; i++) {
        let dTemp = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
        let m = dTemp.getMonth() + 1;
        let a = dTemp.getFullYear();
        let mStr = m < 10 ? '0' + m : '' + m;
        chavesProjetadas.push(mStr + '/' + a);
        labelList.push(mesesNomes[dTemp.getMonth()] + '/' + String(a).substring(2) + ' (Proj)');
      }

      let consumoPorChave = {};
      dadosMandados.forEach(function(d) {
        let principal = (d.enderecoPrincipal && d.enderecoPrincipal !== 'Não informado' && d.enderecoPrincipal.trim() !== '') ? 1 : 0;
        let secundarias = (d.secundarios && Array.isArray(d.secundarios)) ? d.secundarios.length : 0;
        let totalD = principal + secundarias;

        if (d.data) {
          let parts = d.data.split('/');
          if (parts.length === 3) {
            let m = parseInt(parts[1]);
            let a = parseInt(parts[2]);
            let mStr = m < 10 ? '0' + m : '' + m;
            let chave = mStr + '/' + a;
            consumoPorChave[chave] = (consumoPorChave[chave] || 0) + totalD;
          }
        }
      });

      let dadosReais = chavesRealizadas.map(k => consumoPorChave[k] || 0);
      
      let soma = 0;
      let count = 0;
      for (let i = 0; i < dadosReais.length; i++) {
        if (dadosReais[i] > 0) {
          soma += dadosReais[i];
          count++;
        }
      }
      let projMensal = count > 0 ? (soma / count) : 50;

      let datasetReal = [];
      let datasetProj = [];
      
      // Meses Reais
      for (let i = 0; i < chavesRealizadas.length; i++) {
        datasetReal.push(dadosReais[i]);
        if (i === chavesRealizadas.length - 1) {
          datasetProj.push(dadosReais[i]); // Início da linha de projeção
        } else {
          datasetProj.push(null);
        }
      }
      
      // Meses Projetados
      let ultimoValorReal = dadosReais[dadosReais.length - 1];
      for (let i = 0; i < chavesProjetadas.length; i++) {
        datasetReal.push(null);
        datasetProj.push(ultimoValorReal + (i + 1) * projMensal);
      }

      let datasetLimite = labelList.map(() => limiteMensal);

      _chartInstances['graficoGeocodificacaoPrevisao'] = new Chart(document.getElementById('graficoGeocodificacaoPrevisao'), {
        type: 'line',
        data: {
          labels: labelList,
          datasets: [
            {
              label: 'Consumo Real',
              data: datasetReal,
              borderColor: 'var(--accent)',
              backgroundColor: 'rgba(108, 99, 255, 0.05)',
              borderWidth: 3,
              fill: true,
              tension: 0.3
            },
            {
              label: 'Previsão de Consumo',
              data: datasetProj,
              borderColor: 'rgba(108, 99, 255, 0.5)',
              borderDash: [5, 5],
              borderWidth: 2,
              fill: false,
              tension: 0.3
            },
            {
              label: 'Limite Mensal',
              data: datasetLimite,
              borderColor: 'var(--danger)',
              borderWidth: 1.5,
              borderDash: [3, 3],
              pointStyle: false,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { font: { size: 10 } }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: 'Quantidade de Endereços',
                font: { size: 10 }
              }
            }
          }
        }
      });
    }

    graficosDesenhados = true;
  }

  window.extrairListaCrimes = function(d) {
    let crimes = new Set();
    let extras = {};
    try { if (d.dadosExtrasJSON) extras = JSON.parse(d.dadosExtrasJSON); } catch(e) {}
    if (extras && extras.titulo) {
      let t = extras.titulo.trim();
      if (t && t !== 'N/A') crimes.add(t);
    }
    if (d.titulo) {
      let t = d.titulo.trim();
      if (t && t !== 'N/A') crimes.add(t);
    }
    if (d.infoProcessuais) {
      let match = d.infoProcessuais.match(/Artigo\s*([\d\w./#-]+)/i);
      if (match) {
        let art = match[1].trim();
        if (art) crimes.add('Art. ' + art);
      }
      if (typeof classificarCrime === 'function') {
        let fallback = classificarCrime(d.infoProcessuais || '').nome;
        if (fallback && fallback !== 'Outros' && fallback !== 'NÃO IDENTIFICADO') {
          crimes.add(fallback);
        }
      }
    }
    if (crimes.size === 0) crimes.add('Outros');
    return Array.from(crimes);
  };

  window.atualizarApenasRadar = function(dados) {
    const radarTrack = document.getElementById('radarCarouselTrack');
    const radarDots = document.getElementById('radarCarouselDots');
    const radarContainer = document.getElementById('radarCarouselContainer');
    if (!radarTrack || !radarContainer) return;

    let crimesSel = window.radarCrimesSelecionados || new Set(['TODOS']);
    let crimesDisponiveis = new Set();
    
    // First pass: Filter ONLY by GPS area, and collect crimes
    let dataForGps = dados.filter(function(d) {
      if(d.status !== 'Procurado' || d.semEndereco || !d.lat || !d.lng) return false;
      if (window.gpsAreaEncontrada) {
        let gpsCPI = normalizarArea(window.gpsAreaEncontrada.cpi || '');
        let gpsBtl = normalizarArea(window.gpsAreaEncontrada.batalhao || '');
        let gpsCia = normalizarArea(window.gpsAreaEncontrada.cia || '');
        
        let alvoCPI = normalizarArea(d.cpi || d.cpiArea || '');
        let alvoBtl = normalizarArea(d.bpmArea || d.batalhao || '');
        let alvoCia = normalizarArea(d.ciaArea || '');
        
        if (gpsCPI && alvoCPI !== gpsCPI) return false;
        if (gpsBtl && alvoBtl !== gpsBtl) return false;
        if (gpsCia && alvoCia !== gpsCia) return false;
      }
      return true;
    });

    // Populate available crimes
    dataForGps.forEach(d => {
      let crimesDoMandado = window.extrairListaCrimes(d);
      crimesDoMandado.forEach(c => crimesDisponiveis.add(c));
    });

    const contFiltro = document.getElementById('containerFiltroRadarCrime');
    if (contFiltro) {
       let htmlBtns = `<button onclick="toggleRadarCrime(this, 'TODOS')" data-crime="TODOS" style="padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid ${crimesSel.has('TODOS') ? 'var(--brand-red)' : 'rgba(255,255,255,0.1)'};background:${crimesSel.has('TODOS') ? 'var(--brand-red)' : 'rgba(255,255,255,0.05)'};color:${crimesSel.has('TODOS') ? 'white' : 'var(--text-secondary)'};cursor:pointer;transition:all 0.2s;">Todos</button>`;
       
       let crimesOrdenados = Array.from(crimesDisponiveis).sort();
       crimesOrdenados.forEach(c => {
         let isSel = crimesSel.has(c);
         htmlBtns += `<button onclick="toggleRadarCrime(this, '${c}')" data-crime="${c}" style="padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid ${isSel ? 'var(--brand-red)' : 'rgba(255,255,255,0.1)'};background:${isSel ? 'var(--brand-red)' : 'rgba(255,255,255,0.05)'};color:${isSel ? 'white' : 'var(--text-secondary)'};cursor:pointer;transition:all 0.2s;">${c}</button>`;
       });
       if (contFiltro.innerHTML !== htmlBtns) {
         contFiltro.innerHTML = htmlBtns;
       }
    }

    let radarData = dataForGps.filter(function(d) {
      if (!crimesSel.has('TODOS')) {
        let crimesDoMandado = window.extrairListaCrimes(d);
        let temAlgum = crimesDoMandado.some(c => crimesSel.has(c));
        if (!temAlgum) return false;
      }
      return true;
    });

    radarData.sort(function(a, b) {
      let gravA = 0; let gravB = 0;
      if(typeof classificarGravidade === 'function') {
        gravA = classificarGravidade(a);
        gravB = classificarGravidade(b);
      }
      if (gravA !== gravB) return gravB - gravA; 
      let distA = a._distanciaKm !== undefined && !isNaN(a._distanciaKm) ? a._distanciaKm : 99999;
      let distB = b._distanciaKm !== undefined && !isNaN(b._distanciaKm) ? b._distanciaKm : 99999;
      return distA - distB;
    });

    radarTrack.innerHTML = '';
    if (radarDots) radarDots.innerHTML = '';

    if (radarData.length === 0) {
      radarTrack.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:12px;text-align:center;width:100%;">Nenhum alvo procurado encontrado com os filtros atuais.</div>';
      radarContainer.style.display = 'block';
      return;
    }

    const updateDots = () => {
      if (!radarDots) return;
      radarDots.innerHTML = '';
      const totalCards = radarTrack.querySelectorAll('.radar-card').length;
      for (let i = 0; i < totalCards; i++) {
        let dot = document.createElement('div');
        dot.className = 'radar-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => {
          const cards = radarTrack.querySelectorAll('.radar-card');
          if (cards[i]) cards[i].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });
        radarDots.appendChild(dot);
      }
    };

    const updateActiveRadarCard = () => {
      const cards = radarTrack.querySelectorAll('.radar-card');
      if (cards.length === 0) return;
      const trackCenter = radarTrack.scrollLeft + radarTrack.clientWidth / 2;
      
      let closestCard = null;
      let minDistance = Infinity;
      
      cards.forEach(card => {
        const cardCenter = card.offsetLeft + card.clientWidth / 2;
        const distance = Math.abs(trackCenter - cardCenter);
        
        if (distance < minDistance) {
          minDistance = distance;
          closestCard = card;
        }
        card.classList.remove('active');
      });
      
      if (closestCard) {
        closestCard.classList.add('active');
        
        if (radarDots) {
          const dots = radarDots.querySelectorAll('.radar-dot');
          dots.forEach(dot => dot.classList.remove('active'));
          const activeIndex = Array.from(cards).indexOf(closestCard);
          if (dots[activeIndex]) {
            dots[activeIndex].classList.add('active');
          }
        }
      }
    };

    let radarIdx = 0;
    const renderRadarChunk = () => {
      let limit = Math.min(radarIdx + 10, radarData.length);
      for (; radarIdx < limit; radarIdx++) {
        let d = radarData[radarIdx];
        try {
          let extras = {};
          try { if (d.dadosExtrasJSON) extras = JSON.parse(d.dadosExtrasJSON); } catch(e) {}

          let tipoCrime = 'Outros';
          if (typeof classificarCrime === 'function') {
            tipoCrime = classificarCrime(d.infoProcessuais || '').nome;
          }
          
          let tipoMandado = 'MANDADO DE PRISÃO';
          if (extras && extras.titulo) tipoMandado = extras.titulo.toUpperCase();
          else if (d.titulo) tipoMandado = d.titulo.toUpperCase();

          let fotoRaw = d.fotoUrl || d.foto || '';
          let foto = (fotoRaw && fotoRaw !== 'N/A') ? fotoRaw : (typeof SILHUETA_SEM_FOTO !== 'undefined' ? SILHUETA_SEM_FOTO : '');
          let statusColorClass = d.status === 'Procurado' ? 'status-procurado' : 'status-capturado';
          
          let alcunha = extras.alcunha || d.alcunha || '';
          let alcunhaHtml = alcunha ? '<div class="radar-alcunha">' + alcunha + '</div>' : '';
          let domesticaHtml = extras.violenciaDomestica ? '<div class="radar-meta" style="color:#f59e0b;font-weight:700;">V. DOMÉSTICA</div>' : '';

          let cardHtml = `
            <div class="radar-card ${statusColorClass}" data-mandado="${d.mandado || ''}">
              <div class="radar-card-top">
                <img src="${foto}" class="radar-photo" onerror="this.src=(typeof SILHUETA_SEM_FOTO !== 'undefined' ? SILHUETA_SEM_FOTO : '')" />
                <div class="radar-badges">
                  <div class="radar-badge-type">${tipoMandado}</div>
                  <div class="radar-badge-severity">
                    <span class="material-symbols-outlined" style="font-size:12px;">warning</span> ${d.status ? d.status.toUpperCase() : 'PROCURADO'}
                  </div>
                  <div class="radar-meta-item" style="color:var(--brand-red);font-weight:900;">CPI: ${d.cpi || d.cpiArea || '-'}</div>
                  <div class="radar-meta-item" style="font-weight:700;">BTL: ${d.batalhao || d.bpmArea || '-'}</div>
                  <div class="radar-meta-item" style="font-weight:700;">CIA: ${d.ciaArea || '-'}</div>
                </div>
              </div>
              <div class="radar-card-bottom">
                ${alcunhaHtml}
                <div class="radar-name">${d.nome || 'Desconhecido'}</div>
                <div class="radar-meta">Mandado ${d.mandado || ''}</div>
                <div class="radar-meta">CPF: ${d.cpf || 'Não informado'}</div>
                ${domesticaHtml}
                <div class="radar-meta" style="display:flex;justify-content:space-between;gap:8px;">
                  <span style="font-weight:700;color:var(--highlight);">CRIME: ${tipoCrime}</span>
                  <span>Validade: ${d.validade || '-'}</span>
                </div>
                <button class="radar-btn" onclick="verDetalhesDoRadar(this.closest('.radar-card').getAttribute('data-mandado')); event.stopPropagation();">Ver Detalhes</button>
              </div>
            </div>
          `;
          radarTrack.insertAdjacentHTML('beforeend', cardHtml);
        } catch(ex) {
          console.warn("Erro ao renderizar card do radar:", ex, d);
        }
      }
      
      if (radarIdx < radarData.length) {
        window.requestAnimationFrame(renderRadarChunk);
      } else {
        updateDots();
        updateActiveRadarCard();
      }
    };

    renderRadarChunk();

    // Eventos com remoção adequada para evitar duplicações e bugs
    if (window.radarScrollHandler) {
      radarTrack.removeEventListener('scroll', window.radarScrollHandler);
    }
    window.radarScrollHandler = function() {
      updateActiveRadarCard();
    };
    radarTrack.addEventListener('scroll', window.radarScrollHandler);

    if (window.radarResizeHandler) {
      window.removeEventListener('resize', window.radarResizeHandler);
    }
    window.radarResizeHandler = updateActiveRadarCard;
    window.addEventListener('resize', window.radarResizeHandler);
    
    // EXIBE O CARROSSEL (se tiver dados)
    radarContainer.style.display = 'block';
  };

  window.toggleRadarCrime = function(btn, crime) {
    if (!window.radarCrimesSelecionados) window.radarCrimesSelecionados = new Set(['TODOS']);
    
    if (crime === 'TODOS') {
      window.radarCrimesSelecionados = new Set(['TODOS']);
    } else {
      window.radarCrimesSelecionados.delete('TODOS');
      if (window.radarCrimesSelecionados.has(crime)) {
        window.radarCrimesSelecionados.delete(crime);
      } else {
        window.radarCrimesSelecionados.add(crime);
      }
      if (window.radarCrimesSelecionados.size === 0) window.radarCrimesSelecionados.add('TODOS');
    }
    
    const btns = document.getElementById('containerFiltroRadarCrime').querySelectorAll('button');
    btns.forEach(b => {
      let c = b.getAttribute('data-crime');
      if (window.radarCrimesSelecionados.has(c)) {
        b.style.background = 'var(--brand-red)';
        b.style.color = 'white';
        b.style.borderColor = 'var(--brand-red)';
      } else {
        b.style.background = 'rgba(255,255,255,0.05)';
        b.style.color = 'var(--text-secondary)';
        b.style.borderColor = 'rgba(255,255,255,0.1)';
      }
    });
    
    if (typeof atualizarApenasRadar === 'function') {
      setTimeout(() => {
        atualizarApenasRadar((typeof dadosMandados !== 'undefined' ? dadosMandados : []));
      }, 100);
    }
  };

  window.verDetalhesDoRadar = function(mandadoNum) {
    const searchInput = document.getElementById('buscaRapidaLista');
    if (searchInput) {
      searchInput.value = '';
      searchInput.dispatchEvent(new Event('input'));
    }
    
    // Altera para a aba "Lista de Mandados" se estiver em outra aba
    const abaLista = document.querySelector('[data-tab="view-lista-mandados"]');
    if (abaLista) {
      abaLista.click();
    }
    
    setTimeout(() => {
      const accordionHeaders = document.querySelectorAll('.accordion-header');
      let targetHeader = null;
      accordionHeaders.forEach(header => {
        if (header.innerText.includes(mandadoNum)) {
          targetHeader = header;
        }
      });
      
      if (targetHeader) {
        targetHeader.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const item = targetHeader.closest('.accordion-item');
        if (item && !item.classList.contains('open')) {
          toggleAccordionUnico(targetHeader);
        }
      } else {
        chamarAlertaTatico('LISTA', 'Mandado não encontrado na lista geral.', 'OK');
      }
    }, 200);
  };

</script>
