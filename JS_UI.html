<script>
  /* ================================================================
     SENTINELA v2.0 — JS_UI: Controles de Interface Responsiva
     ================================================================ */

  // ---- SIDEBAR TOGGLE ----
  function toggleSidebar() {
    if (window.innerWidth >= 768) {
      document.body.classList.toggle('desktop-open');
      setTimeout(() => { if (mapaPrincipal) google.maps.event.trigger(mapaPrincipal, 'resize'); }, 350);
    } else {
      document.body.classList.toggle('mobile-open');
      const backdrop = document.getElementById('drawerBackdrop');
      if (document.body.classList.contains('mobile-open')) {
        backdrop.style.display = 'block';
        setTimeout(() => backdrop.style.opacity = '1', 10);
      } else {
        backdrop.style.opacity = '0';
        setTimeout(() => backdrop.style.display = 'none', 300);
      }
    }
  }

  // ---- BUSCA MOBILE ----
  function toggleMobileSearch() {
    const overlay = document.getElementById('mobileSearchOverlay');
    if (overlay.style.display === 'none' || !overlay.style.display) {
      overlay.style.display = 'flex';
      setTimeout(() => overlay.style.transform = 'translateY(0)', 10);
    } else {
      overlay.style.transform = 'translateY(-100%)';
      setTimeout(() => overlay.style.display = 'none', 300);
    }
  }

  function filtrarNoMapaMobile() {
    document.getElementById('filtroNome').value = document.getElementById('filtroNomeMobile').value;
    
    // Sincroniza os dropdowns do mobile com os filtros globais (Desktop)
    const syncFiltro = (idMobile, idDesktop) => {
      const elMobile = document.getElementById(idMobile);
      const elDesktop = document.getElementById(idDesktop);
      if (elMobile && elDesktop) {
        elDesktop.value = elMobile.value;
      }
    };
    
    syncFiltro('filtroCPIMobile', 'filtroCPI');
    syncFiltro('filtroBatalhaoMobile', 'filtroBatalhao');
    syncFiltro('filtroCIAMobile', 'filtroCIA');
    syncFiltro('filtroCrimeMobile', 'filtroCrime');
    syncFiltro('filtroSexoMobile', 'filtroSexo');
    syncFiltro('filtroTipoMandadoMobile', 'filtroTipoMandado');
    
    filtrarNoMapa();
  }

  // ---- ALTERNÂNCIA DE VIEWS ----
  function alternarVisaoTatica(visao) {
    if (window.innerWidth >= 768) {
      document.body.classList.add('desktop-open');
    } else {
      if (document.body.classList.contains('mobile-open')) toggleSidebar();
    }
    if (visao) alternarVisaoGlobal(visao);
  }

  function alternarVisaoGlobal(visaoDesejada) {
    const viewIds = ['view-mapa', 'view-lista', 'view-relatorios', 'view-ranking', 'view-perfil', 'view-ajustes', 'view-usuarios', 'view-conferencia'];
    const btnIds = ['nav-btn-mapa', 'nav-btn-lista', 'nav-btn-relatorios', 'nav-btn-ranking', 'nav-btn-perfil', 'nav-btn-ajustes', 'nav-btn-usuarios', 'nav-btn-conferencia'];

    // Esconder todas as views
    viewIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.display = 'none'; }
    });

    // Desativar todos os botões
    btnIds.forEach(id => {
      const btn = document.getElementById(id);
      if (btn) {
        btn.classList.remove('active');
        btn.style.background = 'transparent';
        btn.style.color = 'var(--text-secondary)';
        btn.style.boxShadow = 'none';
      }
    });

    // Ativar a view selecionada
    const viewEl = document.getElementById('view-' + visaoDesejada);
    if (viewEl) viewEl.style.display = 'flex';

    const btnEl = document.getElementById('nav-btn-' + visaoDesejada);
    if (btnEl) {
      btnEl.classList.add('active');
      btnEl.style.background = 'var(--accent)';
      btnEl.style.color = 'white';
      btnEl.style.boxShadow = '4px 4px 10px rgba(108,99,255,0.3), -2px -2px 6px var(--shadow-light)';
    }

    // Ações especiais por view
    if (visaoDesejada === 'mapa') {
      setTimeout(() => { if (mapaPrincipal) google.maps.event.trigger(mapaPrincipal, 'resize'); }, 100);
    }
    if (visaoDesejada === 'relatorios') atualizarGraficosComFiltro();
    if (visaoDesejada === 'ranking') carregarRanking();
    if (visaoDesejada === 'perfil') carregarPerfil();
    if (visaoDesejada === 'ajustes') carregarAjustes();
    if (visaoDesejada === 'conferencia' && typeof carregarConferencia === 'function') carregarConferencia();
    if (visaoDesejada === 'usuarios') {
      if (typeof carregarUsuariosGrade === 'function') carregarUsuariosGrade();
    }

    // Módulo 2: Desabilitar filtros do topo quando lista ativa
    var desktopSearch = document.getElementById('desktopSearch');
    var desktopFilters = document.getElementById('desktopFiltersContainer');
    if (visaoDesejada === 'lista') {
      if (desktopSearch) desktopSearch.style.display = 'none';
      if (desktopFilters) desktopFilters.style.display = 'none';
    } else if (window.innerWidth >= 768) {
      if (desktopSearch) desktopSearch.style.display = 'flex';
      if (desktopFilters) desktopFilters.style.display = 'flex';
    }
  }

  // ---- TABELA DE MANDADOS E FOCO ----
  function focarNoMapa(mandado) {
    if (typeof listaMarcadores === 'undefined') return;
    const marcador = listaMarcadores.find(m => m._mandadoRef === mandado);
    if (marcador) {
      alternarVisaoGlobal('mapa');
      if (typeof mapaPrincipal !== 'undefined' && mapaPrincipal) {
        mapaPrincipal.panTo(marcador.position);
        mapaPrincipal.setZoom(16);
        // Simular o clique no marcador nativamente
        google.maps.event.trigger(marcador, 'click');
      }
    } else {
      chamarAlertaTatico('MAPA', 'Marcador não encontrado ou filtrado.', 'OK');
    }
  }

  function renderizarTabelaMandados(dados) {
    const container = document.getElementById('tabelaMandados');
    if (!container) return;

    // Atualizar filtro de batalhões caso seja a primeira carga
    if (document.getElementById('filtroListaBatalhao') && document.getElementById('filtroListaBatalhao').options.length <= 1) {
      atualizarFiltroBatalhoesLista();
    }

    // Atualizar contadores
    atualizarContadores(dados);

    if (!dados || dados.length === 0) {
      container.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);"><span class="material-symbols-outlined" style="font-size:40px;opacity:0.5;">search_off</span><p style="font-size:13px;margin-top:8px;">Nenhum mandado encontrado com os filtros atuais.</p></div>';
      return;
    }

    const isMobile = window.innerWidth < 768;
    const isAdmin = (typeof perfilUsuario !== 'undefined' && perfilUsuario === 'Admin');

    if (isMobile) {
      // ========== LAYOUT MOBILE: CARDS ==========
      let html = '<div style="display:flex;flex-direction:column;gap:10px;padding:8px;">';

      dados.forEach(function(d, idx) {
        let corStatus = d.status === 'Capturado' ? 'var(--success)' : (d.status === 'Procurado' ? 'var(--danger)' : 'var(--warning)');
        let bordaCor = d.semEndereco ? 'var(--warning)' : corStatus;
        let crime = 'Outros';
        let crimeSvg = '';
        let isNaoClassificado = false;
        if (typeof classificarCrime === 'function') {
          var cls = classificarCrime(d.infoProcessuais || '');
          crime = cls.nome;
          isNaoClassificado = cls.naoClassificado === true;
          crimeSvg = '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + cls.cor + ';vertical-align:middle;margin-right:4px;"></span>';
        }
        let dias = '-';
        if (typeof calcularDiasRestantes === 'function') {
          var dr = calcularDiasRestantes(d.validade);
          if (dr !== null) dias = dr <= 0 ? 'VENCIDO' : dr + 'd';
        }

        let tipoMandadoStr = '';
        try {
          var extrasJson = JSON.parse(d.dadosExtrasJSON || '{}');
          if (extrasJson && extrasJson.titulo) {
            tipoMandadoStr = extrasJson.titulo.toUpperCase();
          }
        } catch(e) {}
        
        let labelTipoHTML = '';
        if (tipoMandadoStr) {
          labelTipoHTML = '<div style="font-size:9px;color:var(--text-secondary);font-weight:800;letter-spacing:0.5px;margin-top:8px;margin-bottom:-4px;">' + tipoMandadoStr + '</div>';
        }

        var cardNcClass = isNaoClassificado ? ' card-nao-classificado' : '';
        var badgeNC = '';
        if (isNaoClassificado && isAdmin) {
          badgeNC = '<div style="margin-top:6px;"><span class="badge-nao-classificado" onclick="abrirModalClassificarCrime(\'' + d.mandado.replace(/'/g, "\\'") + '\', \'' + (d.infoProcessuais || '').replace(/'/g, "\\'").replace(/"/g, '&quot;') + '\')"><span class="material-symbols-outlined" style="font-size:12px;">warning</span> CLASSIFICAR CRIME</span></div>';
        } else if (isNaoClassificado) {
          badgeNC = '<div style="margin-top:6px;"><span class="badge-nao-classificado"><span class="material-symbols-outlined" style="font-size:12px;">warning</span> NÃO CLASSIFICADO</span></div>';
        }
        html += '<div class="neu-card' + cardNcClass + '" style="padding:12px;border-left:3px solid ' + (isNaoClassificado ? '#f59e0b' : bordaCor) + ';">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">' +
            '<div style="font-weight:800;font-size:13px;color:var(--text-primary);flex:1;min-width:0;display:flex;align-items:center;gap:6px;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;">' + (d.nome || 'N/A') + '</span> <button onclick="copiarParaAreaTransferencia(\'' + (d.nome||'').replace(/'/g, "\\'") + '\', this)" style="background:transparent;border:none;cursor:pointer;padding:0;display:flex;align-items:center;flex-shrink:0;" title="Copiar Nome"><span class="material-symbols-outlined" style="font-size:14px;color:var(--text-muted);">content_copy</span></button></div>' +
            '<div style="display:flex;gap:4px;align-items:center;flex-shrink:0;">' +
              (d.semEndereco ? '<span style="background:var(--warning)20;border:1px solid var(--warning)40;color:var(--warning);padding:2px 4px;border-radius:4px;font-size:8px;font-weight:800;">S/ END</span>' : '') +
              '<span style="background:' + corStatus + '20;border:1px solid ' + corStatus + '40;color:' + corStatus + ';padding:2px 6px;border-radius:4px;font-size:9px;font-weight:800;text-transform:uppercase;white-space:nowrap;">' + d.status + '</span>' +
            '</div>' +
          '</div>' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:10px;color:var(--text-secondary);">' +
            '<span>' + crimeSvg + ' ' + crime + '</span>' +
            '<span style="font-weight:700;"><span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle;">timer</span> ' + dias + '</span>' +
          '</div>' +
          badgeNC +
          labelTipoHTML +
          '<div style="font-size:9px;color:var(--accent);font-family:var(--font-mono);font-weight:700;margin-top:6px;display:flex;align-items:center;gap:6px;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + d.mandado + '</span> <button onclick="copiarParaAreaTransferencia(\'' + d.mandado + '\', this)" style="background:transparent;border:none;cursor:pointer;padding:0;display:flex;align-items:center;" title="Copiar Mandado"><span class="material-symbols-outlined" style="font-size:12px;color:var(--text-muted);">content_copy</span></button></div>' +
          '<div style="display:flex;gap:6px;margin-top:8px;align-items:center;">' +
            (!d.semEndereco ? '<button class="neu-btn" style="padding:4px 8px;font-size:9px;display:inline-flex;align-items:center;gap:4px;flex:1;justify-content:center;" onclick="focarNoMapa(\'' + d.mandado + '\')"><span class="material-symbols-outlined" style="font-size:12px;">my_location</span> MAPA</button>' : '<span style="flex:1;text-align:center;font-size:9px;color:var(--warning);"><span class="material-symbols-outlined" style="font-size:10px;vertical-align:middle;">location_off</span> Sem localização</span>') +
            (isAdmin ? '<button class="neu-btn" style="padding:4px 8px;font-size:9px;display:inline-flex;align-items:center;gap:4px;" onclick="abrirModalEditar(\'' + d.mandado + '\')"><span class="material-symbols-outlined" style="font-size:12px;">edit</span> EDITAR</button>' : '') +
            '<button class="neu-btn" style="padding:4px 8px;font-size:9px;display:inline-flex;align-items:center;gap:4px;" onclick="toggleDetalhesCard(this)"><span class="material-symbols-outlined" style="font-size:12px;">expand_more</span> INFO</button>' +
          '</div>' +
          '<div class="card-detalhes-mobile" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--text-secondary);line-height:1.8;">' +
            '<div><b>CPF:</b> ' + (d.cpf || 'N/A') + ' <button onclick="copiarParaAreaTransferencia(\'' + d.cpf + '\', this)" style="background:transparent;border:none;cursor:pointer;padding:0;flex-shrink:0;"><span class="material-symbols-outlined" style="font-size:10px;color:var(--text-muted);">content_copy</span></button></div>' +
            '<div><b>RG:</b> ' + (d.rg || 'N/A') + ' <button onclick="copiarParaAreaTransferencia(\'' + d.rg + '\', this)" style="background:transparent;border:none;cursor:pointer;padding:0;flex-shrink:0;"><span class="material-symbols-outlined" style="font-size:10px;color:var(--text-muted);">content_copy</span></button></div>' +
            '<div><b>Filiação:</b> ' + (d.filiacao || 'N/A') + '</div>' +
            '<div><b>Batalhão:</b> ' + (d.batalhao || '-') + '</div>' +
            (d.cpiArea ? '<div><b>CPI:</b> ' + d.cpiArea + '</div>' : '') +
            (d.ciaArea ? '<div><b>CIA:</b> ' + d.ciaArea + '</div>' : '') +
            (d.cidade ? '<div><b>Cidade:</b> ' + d.cidade + '</div>' : '') +
            '<div><b>Validade:</b> ' + (d.validade || 'N/A') + '</div>' +
            '<div><b>Endereço:</b> ' + (d.enderecoPrincipal || 'N/A') + '</div>' +
          '</div>' +
        '</div>';
      });

      html += '</div>';
      container.innerHTML = html;

    } else {
      // ========== LAYOUT DESKTOP: TABELA ==========
      let html = '<table style="width:100%; border-collapse:collapse; text-align:left; table-layout:fixed;">' +
        '<thead><tr style="border-bottom:1px solid var(--border); color:var(--text-secondary); font-size:10px; text-transform:uppercase; letter-spacing:1px;">' +
        '<th style="padding:16px;width:25%;">Alvo / Filiação</th>' +
        '<th style="padding:16px;width:25%;">Mandado / Docs</th>' +
        '<th style="padding:16px;width:17%;">Status / Validade</th>' +
        '<th style="padding:16px;width:13%;">Crime</th>' +
        '<th style="padding:16px;width:20%;text-align:right;">Ações</th>' +
        '</tr></thead><tbody>';

      dados.forEach(function(d) {
        let corStatus = d.status === 'Capturado' ? 'var(--success)' : (d.status === 'Procurado' ? 'var(--danger)' : 'var(--warning)');
        let crime = 'Outros';
        let crimeSvg = '';
        let isNaoClassificado = false;
        if (typeof classificarCrime === 'function') {
          var cls = classificarCrime(d.infoProcessuais || '');
          crime = cls.nome;
          isNaoClassificado = cls.naoClassificado === true;
          crimeSvg = '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="vertical-align:middle;"><g fill="' + cls.cor + '">' + cls.svgPath + '</g></svg>';
        }

        let dias = '-';
        if (typeof calcularDiasRestantes === 'function') {
          var dr = calcularDiasRestantes(d.validade);
          if (dr !== null) dias = dr <= 0 ? 'VENCIDO' : dr + ' dias';
        }

        let tipoMandadoStr = '';
        try {
          var extrasJson = JSON.parse(d.dadosExtrasJSON || '{}');
          if (extrasJson && extrasJson.titulo) {
            tipoMandadoStr = extrasJson.titulo.toUpperCase();
          }
        } catch(e) {}
        
        let labelTipoHTML = '';
        if (tipoMandadoStr) {
          labelTipoHTML = '<div style="font-size:9px;color:var(--text-secondary);font-weight:800;letter-spacing:0.5px;margin-bottom:2px;">' + tipoMandadoStr + '</div>';
        }

        var btnCopiar = function(txt) { return '<button onclick="copiarParaAreaTransferencia(\'' + txt + '\', this)" title="Copiar" style="background:transparent;border:none;cursor:pointer;padding:2px;display:inline-flex;align-items:center;"><span class="material-symbols-outlined" style="font-size:12px;color:var(--text-muted);">content_copy</span></button>'; };

        var trClass = d.semEndereco ? ' class="linha-sem-endereco"' : '';

        html += '<tr' + trClass + ' style="border-bottom:1px solid rgba(255,255,255,0.02); transition:var(--transition);" onmouseover="this.style.background=\'var(--bg-depressed)\'" onmouseout="this.style.background=\'' + (d.semEndereco ? 'rgba(245,158,11,0.04)' : 'transparent') + '\'">' +
          '<td style="padding:12px 16px;overflow:hidden;">' +
            '<div style="font-weight:800;font-size:13px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + (d.nome || 'N/A') + btnCopiar(d.nome) + '</div>' +
            '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + (d.filiacao || '') + '">' + (d.filiacao || 'N/A') + '</div>' +
          '</td>' +
          '<td style="padding:12px 16px;overflow:hidden;">' +
            labelTipoHTML +
            '<div style="font-size:10px;color:var(--accent);font-family:var(--font-mono);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + d.mandado + btnCopiar(d.mandado) + '</div>' +
            '<div style="font-size:10px;color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">CPF: ' + (d.cpf || 'N/A') + btnCopiar(d.cpf) + ' | RG: ' + (d.rg || 'N/A') + '</div>' +
          '</td>' +
          '<td style="padding:12px 16px; font-size:11px; color:var(--text-secondary);">' +
            '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">' +
              '<span style="background:' + corStatus + '20; border:1px solid ' + corStatus + '40; color:' + corStatus + '; padding:3px 6px; border-radius:6px; font-size:9px; font-weight:800; text-transform:uppercase;">' + d.status + '</span>' +
              (d.semEndereco ? '<span style="background:var(--warning)20;border:1px solid var(--warning)40;color:var(--warning);padding:3px 6px;border-radius:6px;font-size:8px;font-weight:800;">S/ END</span>' : '') +
            '</div>' +
            '<div style="font-size:9px;margin-top:4px;">Val: ' + dias + '</div>' +
          '</td>' +
          '<td style="padding:12px 16px; font-size:11px; font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;' + (isNaoClassificado ? 'background:rgba(245,158,11,0.15);color:#f59e0b;' : '') + '">' + 
            (isNaoClassificado && isAdmin ? '<span class="badge-nao-classificado" style="font-size:8px;" onclick="abrirModalClassificarCrime(\'' + d.mandado.replace(/'/g, "\\'") + '\', \'' + (d.infoProcessuais || '').replace(/'/g, "\\'").replace(/"/g, '&quot;') + '\')"><span class="material-symbols-outlined" style="font-size:11px;">warning</span> CLASSIFICAR</span>' : (crimeSvg + ' ' + crime)) + '</td>' +
          '<td style="padding:12px 16px; text-align:right;white-space:nowrap;">' +
            (!d.semEndereco ? '<button class="neu-btn" style="padding:5px 10px; font-size:9px; display:inline-flex; align-items:center; gap:4px;" onclick="focarNoMapa(\'' + d.mandado + '\')"><span class="material-symbols-outlined" style="font-size:13px;">my_location</span>MAPA</button> ' : '') +
            (isAdmin ? '<button class="neu-btn" style="padding:5px 10px; font-size:9px; display:inline-flex; align-items:center; gap:4px;" onclick="abrirModalEditar(\'' + d.mandado + '\')"><span class="material-symbols-outlined" style="font-size:13px;">edit</span>EDITAR</button>' : '') +
          '</td>' +
        '</tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }
  }

  // ========== CONTADORES ==========
  function atualizarContadores(dadosFiltrados) {
    var el = document.getElementById('cntTotal');
    if (!el) return;
    document.getElementById('cntTotal').textContent = dadosFiltrados.length;
    document.getElementById('cntProcurados').textContent = dadosFiltrados.filter(function(d) { return d.status === 'Procurado'; }).length;
    document.getElementById('cntCapturados').textContent = dadosFiltrados.filter(function(d) { return d.status === 'Capturado'; }).length;
    document.getElementById('cntSemEndereco').textContent = dadosFiltrados.filter(function(d) { return d.semEndereco; }).length;
  }

  // ========== FILTROS DA LISTA ==========
  function aplicarFiltrosLista() {
    var termoTextual = (document.getElementById('filtroListaNome').value || '').toLowerCase();
    var filtroEnd = document.getElementById('filtroListaEndereco').value;
    var filtroBatalhao = document.getElementById('filtroListaBatalhao').value;
    var filtroCpi = document.getElementById('filtroListaCpi') ? document.getElementById('filtroListaCpi').value : 'TODOS';
    var filtroCia = document.getElementById('filtroListaCia') ? document.getElementById('filtroListaCia').value : 'TODOS';
    var filtroSexo = document.getElementById('filtroListaSexo') ? document.getElementById('filtroListaSexo').value : 'TODOS';
    var ordenacao = document.getElementById('ordenacaoLista').value;

    var filtrados = dadosMandados.filter(function(d) {
      // Busca ampla
      var matchTexto = true;
      if (termoTextual.length > 0) {
        var textoComparacao = [
          d.nome, d.mandado, d.cpf, d.rg, d.filiacao, 
          (d.infoProcessuais ? classificarCrime(d.infoProcessuais).nome : '')
        ].join(' ').toLowerCase();
        matchTexto = textoComparacao.includes(termoTextual);
      }
      
      var matchBatalhao = (filtroBatalhao === 'TODOS' || d.batalhao === filtroBatalhao);
      var matchEnd = (filtroEnd === 'TODOS' || (filtroEnd === 'SEM' && d.semEndereco) || (filtroEnd === 'COM' && !d.semEndereco));
      var matchCpi = (filtroCpi === 'TODOS' || (d.cpiArea || '') === filtroCpi);
      var matchCia = (filtroCia === 'TODOS' || (d.ciaArea || '') === filtroCia);
      var matchSexo = (filtroSexo === 'TODOS' || (d.sexo || '').toUpperCase() === filtroSexo.toUpperCase());
      
      return matchTexto && matchBatalhao && matchEnd && matchCpi && matchCia && matchSexo;
    });

    if (ordenacao === 'DISTANCIA') {
      ordenarPorDistanciaERenderizar(filtrados);
    } else {
      filtrados.sort(function(a, b) {
        if (ordenacao === 'ALFABETICA') {
          return (a.nome || '').localeCompare(b.nome || '');
        } else if (ordenacao === 'VENCIMENTO') {
          var da = calcularDiasRestantes(a.validade) || 99999;
          var db = calcularDiasRestantes(b.validade) || 99999;
          return da - db;
        } else if (ordenacao === 'ANTIGOS') {
          return a.idLinha - b.idLinha;
        } else {
          // RECENTES (padrão) - inverte a ordem original do banco
          return b.idLinha - a.idLinha;

      });

  // ========== ORDENAÇÃO POR DISTÂNCIA ==========
  function ordenarPorDistanciaERenderizar(dados) {
    if (!navigator.geolocation) {
      chamarAlertaTatico("ERRO GPS", "Seu navegador não suporta geolocalização.", "OK");
      renderizarTabelaMandados(dados);
      document.getElementById('ordenacaoLista').value = "RECENTES";
      return;
    }
    
    // Mostra loading rápido
    document.getElementById('tabelaMandados').innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);"><span class="material-symbols-outlined" style="font-size:40px;animation:spin 1s linear infinite;">sync</span><p style="font-size:13px;margin-top:8px;">Obtendo localização para calcular rotas...</p></div>';

    navigator.geolocation.getCurrentPosition(function(position) {
      var latAtual = position.coords.latitude;
      var lngAtual = position.coords.longitude;
      
      dados.forEach(function(d) {
        if (!d.semEndereco && d.lat && d.lng) {
          d._distanciaKm = calcularDistanciaHaversine(latAtual, lngAtual, d.lat, d.lng);
        } else {
          d._distanciaKm = 99999; // Sem endereço fica no fim
        }
      });
      
      dados.sort(function(a, b) { return a._distanciaKm - b._distanciaKm; });
      renderizarTabelaMandados(dados);
      
    }, function(error) {
      chamarAlertaTatico("ERRO GPS", "Não foi possível obter sua localização. Permita o acesso ao GPS.", "OK");
      renderizarTabelaMandados(dados);
      document.getElementById('ordenacaoLista').value = "RECENTES";
    });
  }

  function calcularDistanciaHaversine(lat1, lon1, lat2, lon2) {
    var R = 6371; // Raio da Terra em km
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

    function sortCpi(a, b) {
      let isCpaA = a.includes('CPA');
      let isCpaB = b.includes('CPA');
      if (isCpaA !== isCpaB) return isCpaA ? 1 : -1;
      let numA = parseInt(a.replace(/\D/g, '')) || 0;
      let numB = parseInt(b.replace(/\D/g, '')) || 0;
      if (numA !== numB) return numA - numB;
      return a.localeCompare(b);
    }

    function sortBpm(a, b) {
      let isBpmiA = a.includes('BPM/I');
      let isBpmiB = b.includes('BPM/I');
      if (isBpmiA !== isBpmiB) return isBpmiA ? -1 : 1;
      let numA = parseInt(a.replace(/\D/g, '')) || 0;
      let numB = parseInt(b.replace(/\D/g, '')) || 0;
      if (numA !== numB) return numA - numB;
      return a.localeCompare(b);
    }

  async function confirmarImportacaoFila() {
    var checkboxes = document.querySelectorAll('.cb-importar-fila:checked');
    if (checkboxes.length === 0) {
      return chamarAlertaTatico("ATENÇÃO", "Selecione ao menos um mandado na lista para importar.", "OK");
    }

    var indicesParaImportar = Array.from(checkboxes).map(function(cb) { return parseInt(cb.getAttribute('data-index')); });
    var loteFiltrado = filaImportacao.filter(function(item, idx) { return indicesParaImportar.includes(idx); });

    var btn = document.getElementById('btnConfirmarFila');
    btn.innerText = 'GEOCODIFICANDO...';
    btn.disabled = true;

    const geocoder = new google.maps.Geocoder();
    function delay(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

    for (var i = 0; i < loteFiltrado.length; i++) {
      var item = loteFiltrado[i];
      btn.innerText = 'GEO: ' + (i + 1) + '/' + loteFiltrado.length;
      
      // Geocodifica principal
      if (item.enderecoPrincipal && item.enderecoPrincipal !== "Não informado" && (!item.latPrincipal || item.latPrincipal === 0)) {
        var c = await geocodeEndereco(geocoder, item.enderecoPrincipal);
        if (c) { 
          item.latPrincipal = c.lat; 
          item.lngPrincipal = c.lng; 
          item.ufPrincipal = c.uf;
        }
        await delay(500);
      }

      // Prepara secundários
      var secArray = [];
      if (item.secundariosText) {
        var a = item.secundariosText.split('||');
        for (var j = 0; j < a.length; j++) {
          var x = a[j].trim();
          if (x) {
            var secObj = { endereco: x, lat: null, lng: null, uf: "" };
            var cSec = await geocodeEndereco(geocoder, x);
            if (cSec) {
              secObj.lat = cSec.lat;
              secObj.lng = cSec.lng;
              secObj.uf = cSec.uf;
            }
            secArray.push(secObj);
            await delay(500);
          }
        }
      }
      item.secundarios = secArray;
    }

    btn.innerText = 'SALVANDO NO BD...';

    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false;
        if(res.sucesso) {
          document.getElementById('view-revisao-importacao').style.display = 'none';
          var fab = document.getElementById('btnAdminNovo');
          var isAdmin = document.getElementById('sidebarPerfilEl') && document.getElementById('sidebarPerfilEl').textContent === 'Admin';
          if (fab && isAdmin) fab.style.display = 'flex';
          chamarAlertaTatico("SUCESSO", res.mensagem, "OK");
          filaImportacao = [];
          sincronizarBD();
        } else {
          chamarAlertaTatico("ERRO", res.mensagem, "OK");
          btn.innerText = 'CONFIRMAR IMPORTAÇÃO (' + filaImportacao.length + ')';
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        chamarAlertaTatico("ERRO FATAL", err.message, "OK");
        btn.innerText = 'CONFIRMAR IMPORTAÇÃO (' + filaImportacao.length + ')';
      })
      .cadastrarMandadosEmLote(loteFiltrado);
  }

  function copiarParaAreaTransferencia(texto, btn) {
    if (!texto || texto === 'N/A') return;
    navigator.clipboard.writeText(texto).then(() => {
      const icon = btn.querySelector('.material-symbols-outlined');
      if(icon) {
        const oldIcon = icon.innerText;
        icon.innerText = 'check';
        icon.style.color = 'var(--success)';
        setTimeout(() => {
          icon.innerText = oldIcon;
          icon.style.color = 'var(--text-muted)';
        }, 1500);
      }
    });
  }

  // ---- GRÁFICOS CHART.JS (Neumórficos) ----
  let graficosDesenhados = false;

  function renderizarGraficos() {
    if (graficosDesenhados || !dadosMandados || dadosMandados.length === 0) return;

    // Stats
    const total = dadosMandados.length;
    const capturados = dadosMandados.filter(d => d.status.toUpperCase() === 'CAPTURADO').length;
    const hoje = new Date();
    let vencendo = 0, vencido = 0;

    dadosMandados.forEach(d => {
      const dias = calcularDiasRestantes(d.validade);
      if (dias !== null) {
        if (dias <= 0) vencido++;
        else if (dias <= 30) vencendo++;
      }
    });

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statCaptura').textContent = capturados + ' (' + Math.round(capturados / total * 100) + '%)';
    document.getElementById('statVencendo').textContent = vencendo;
    document.getElementById('statVencido').textContent = vencido;

    // Config Chart.js
    Chart.defaults.color = '#9090a8';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
    Chart.defaults.font.family = 'Inter';

    // Gráfico de barras: Mandados por mês
    const meses = {};
    dadosMandados.forEach(d => {
      if (d.data) {
        const parts = d.data.split('/');
        if (parts.length === 3) {
          const chave = parts[1] + '/' + parts[2];
          meses[chave] = (meses[chave] || 0) + 1;
        }
      }
    });
    const mesLabels = Object.keys(meses).slice(-6);
    const mesData = mesLabels.map(k => meses[k]);

    new Chart(document.getElementById('graficoLancamentos'), {
      type: 'bar',
      data: {
        labels: mesLabels,
        datasets: [{ label: 'Mandados Inseridos', data: mesData, backgroundColor: '#6c63ff', borderRadius: 6, borderSkipped: false }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true }, x: { ticks: { font: { size: 10 } } } } }
    });

    // Gráfico de linha: Capturas
    new Chart(document.getElementById('graficoCapturas'), {
      type: 'line',
      data: {
        labels: mesLabels,
        datasets: [{ label: 'Capturas', data: mesLabels.map(() => Math.floor(Math.random() * 10)), borderColor: '#2ecc71', backgroundColor: 'rgba(46,204,113,0.1)', fill: true, tension: 0.4 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    // Gráfico de rosca: Crimes
    const crimes = {};
    dadosMandados.forEach(d => {
      const tipo = classificarCrime(d.infoProcessuais || '').nome;
      crimes[tipo] = (crimes[tipo] || 0) + 1;
    });
    const crimeLabels = Object.keys(crimes).slice(0, 5);
    const crimeData = crimeLabels.map(k => crimes[k]);
    const crimeColors = ['#e74c3c', '#f39c12', '#7c3aed', '#2ecc71', '#3498db'];

    new Chart(document.getElementById('graficoCrimes'), {
      type: 'doughnut',
      data: {
        labels: crimeLabels,
        datasets: [{ data: crimeData, backgroundColor: crimeColors, borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
    });

    // Gráfico de barras: Por batalhão
    const batalhoes = {};
    dadosMandados.forEach(d => {
      if (d.batalhao) batalhoes[d.batalhao] = (batalhoes[d.batalhao] || 0) + 1;
    });
    const batLabels = Object.keys(batalhoes).slice(0, 8);
    const batData = batLabels.map(k => batalhoes[k]);

    new Chart(document.getElementById('graficoAreas'), {
      type: 'bar',
      data: {
        labels: batLabels,
        datasets: [{ label: 'Mandados', data: batData, backgroundColor: '#e74c3c', borderRadius: 6, borderSkipped: false }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true }, x: { ticks: { font: { size: 9 } } } } }
    });

    graficosDesenhados = true;
  }

  function hexToRgba(hex, alpha) {
    if (!hex || !hex.startsWith('#') || hex.length !== 7) return hex;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
  }

  function processarUploadCSV() {
    const inputCsv = document.getElementById('inputCsvBNMP');
    const file = inputCsv.files[0];
    if (!file) return;

    document.getElementById('btnProcessarCsv').disabled = true;
    document.getElementById('btnProcessarCsv').innerHTML = 'PROCESSANDO...';

    const reader = new FileReader();
    reader.onload = function(e) {
      const texto = e.target.result;
      const linhas = texto.split(/\r?\n/);
      const matriz = [];
      
      // Parser super simples para CSV
      linhas.forEach(linha => {
        if (!linha.trim()) return;
        // Ponto e vírgula ou vírgula
        const delimitador = linha.includes(';') ? ';' : ',';
        // Split ignorando delimitadores dentro de aspas
        const valores = linha.split(new RegExp(delimitador + '(?=(?:(?:[^"]*"){2})*[^"]*$)'));
        matriz.push(valores.map(v => v.replace(/^"|"$/g, '').trim()));
      });

      if (matriz.length < 2) {
        chamarAlertaTatico('ERRO', 'CSV inválido ou vazio.', 'OK');
        document.getElementById('btnProcessarCsv').disabled = false;
        document.getElementById('btnProcessarCsv').innerHTML = 'CRUZAR DADOS';
        return;
      }

      google.script.run.withSuccessHandler(function(res) {
        if (res.sucesso) {
          const msg = res.mensagem + '<br><br><b>Pela Cruzada:</b><br>- ' + res.pendentes + ' Pendentes em ambos<br>- ' + res.baixados + ' Baixados no BNMP (Não encontrados no CSV)';
          document.getElementById('resultadoConferencia').innerHTML = msg;
          document.getElementById('resultadoConferencia').style.display = 'block';
          chamarAlertaTatico('SUCESSO', res.mensagem, 'OK');
        } else {
          chamarAlertaTatico('ERRO', res.mensagem, 'OK');
        }
        document.getElementById('btnProcessarCsv').disabled = false;
        document.getElementById('btnProcessarCsv').innerHTML = 'CRUZAR DADOS';
      }).processarCruzamentoCSV(matriz);
    };
    reader.readAsText(file, "UTF-8");
  }

  // Helper: calcular dias restantes a partir de uma string dd/mm/yyyy
  function calcularDiasRestantes(dataStr) {
    if (!dataStr) return null;
    const parts = dataStr.split('/');
    if (parts.length !== 3) return null;
    const dataVal = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
    if (isNaN(dataVal.getTime())) return null;
    const hoje = new Date();
    hoje.setHours(0, 0, 0, 0);
    const diff = dataVal.getTime() - hoje.getTime();
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
  }

        {categoria:'Furto',cor:'#ea580c'},{categoria:'Tráfico',cor:'#7c3aed'},
        {categoria:'Estelionato',cor:'#ca8a04'},{categoria:'Receptação',cor:'#b45309'},
        {categoria:'Alimentícia',cor:'#2563eb'},{categoria:'Porte de Arma',cor:'#475569'},
        {categoria:'Trânsito',cor:'#0891b2'},{categoria:'Sequestro',cor:'#7f1d1d'},
        {categoria:'Lesão Corporal',cor:'#b91c1c'},{categoria:'Organização Crim.',cor:'#4338ca'},
        {categoria:'Ameaça',cor:'#9f1239'},{categoria:'Fiscal',cor:'#059669'}
      ];
    }

    var optionsHtml = '<option value="">Selecione...</option>';
    optionsHtml += '<option value="NOVA_NOMECLATURA" style="color:var(--accent);font-weight:bold;background:rgba(99,102,241,0.1);">➕ CRIAR NOVA NOMECLATURA...</option>';
    categorias.forEach(function(c) {
      optionsHtml += '<option value="' + c.categoria + '" style="background:var(--bg-base);">' + c.categoria + '</option>';
    });

    // Extrair possíveis termos do artigo para sugerir como keywords
    var artTexto = (infoProc || '').substring(0, 150);

    var modal = document.createElement('div');
    modal.className = 'modal-classificar-crime';
    modal.id = 'modalClassificarCrime';
    modal.innerHTML = '<div class="modal-body">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">' +
        '<span class="material-symbols-outlined" style="font-size:24px;color:#f59e0b;">warning</span>' +
        '<div style="font-weight:900;font-size:14px;color:var(--text-primary);">CLASSIFICAR CRIME</div>' +
      '</div>' +
      '<div style="background:var(--bg-depressed);border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:10px;color:var(--text-secondary);line-height:1.6;max-height:80px;overflow-y:auto;" class="custom-scrollbar">' +
        '<div style="font-weight:800;font-size:9px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;">Info Processual:</div>' +
        '<div>' + (artTexto || '<em>Sem informação</em>') + '</div>' +
      '</div>' +
      '<div style="margin-bottom:12px;">' +
        '<label style="font-size:10px;font-weight:800;color:var(--text-secondary);display:block;margin-bottom:6px;">NOMECLATURA (Categoria da Lei)</label>' +
        '<select id="selectClassificarCat" onchange="toggleCamposNovaNomeclatura()" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-depressed);color:var(--text-primary);font-size:12px;font-family:var(--font-sans);cursor:pointer;">' +
          optionsHtml +
        '</select>' +
      '</div>' +
      
      // Campos escondidos para quando criar nova nomenclatura
      '<div id="containerNovaNomeclatura" style="display:none;margin-bottom:16px;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px dashed var(--border);">' +
        '<div style="margin-bottom:8px;">' +
          '<label style="font-size:9px;font-weight:800;color:var(--accent);display:block;margin-bottom:4px;">NOME DA NOVA LEI</label>' +
          '<input type="text" id="inputNovaLeiNome" placeholder="Ex: ROUBO DE CARGA" style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-base);color:var(--text-primary);font-size:11px;" />' +
        '</div>' +
        '<div style="display:flex;gap:8px;">' +
          '<div style="flex:1;">' +
            '<label style="font-size:9px;font-weight:800;color:var(--accent);display:block;margin-bottom:4px;">TEXTO DO PINO</label>' +
            '<input type="text" id="inputNovaLeiPino" placeholder="Ex: CARGA" style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-base);color:var(--text-primary);font-size:11px;" />' +
          '</div>' +
          '<div style="width:60px;">' +
            '<label style="font-size:9px;font-weight:800;color:var(--accent);display:block;margin-bottom:4px;">COR</label>' +
            '<input type="color" id="inputNovaLeiCor" value="#dc2626" style="width:100%;height:32px;border:none;border-radius:6px;cursor:pointer;" />' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div style="margin-bottom:16px;">' +
        '<label style="font-size:10px;font-weight:800;color:var(--text-secondary);display:block;margin-bottom:6px;">PALAVRAS-CHAVE <span style="font-weight:400;color:var(--text-muted);">(separar com |)</span></label>' +
        '<input type="text" id="inputNovasKeywords" placeholder="Ex: SEQUESTRO|148" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-depressed);color:var(--text-primary);font-size:12px;font-family:var(--font-sans);box-sizing:border-box;" />' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px;background:rgba(99,102,241,0.08);border-radius:8px;border:1px solid rgba(99,102,241,0.2);">' +
        '<input type="checkbox" id="checkAddKeyword" checked style="width:16px;height:16px;accent-color:var(--accent);" />' +
        '<label for="checkAddKeyword" style="font-size:10px;color:var(--text-secondary);cursor:pointer;line-height:1.4;">Vincular essas palavras-chave à nomenclatura para importações automáticas</label>' +
      '</div>' +
      '<div style="display:flex;gap:8px;">' +
        '<button onclick="fecharModalClassificarCrime()" class="neu-btn" style="flex:1;padding:10px;font-size:11px;justify-content:center;">CANCELAR</button>' +
        '<button onclick="confirmarClassificacaoCrime(\'' + mandado.replace(/'/g, "\\'") + '\')" class="neu-btn neu-btn-accent" style="flex:1;padding:10px;font-size:11px;justify-content:center;">' +
          '<span class="material-symbols-outlined" style="font-size:14px;">check</span> SALVAR' +
        '</button>' +
      '</div>' +
    '</div>';

    document.body.appendChild(modal);
    
    // Fechar ao clicar fora
    modal.addEventListener('click', function(e) {
      if (e.target === modal) fecharModalClassificarCrime();
    });
  }

  function fecharModalClassificarCrime() {
    var modal = document.getElementById('modalClassificarCrime');
    if (modal) modal.remove();
  }

  window.toggleCamposNovaNomeclatura = function() {
    var val = document.getElementById('selectClassificarCat').value;
    var container = document.getElementById('containerNovaNomeclatura');
    if (val === 'NOVA_NOMECLATURA') {
      container.style.display = 'block';
    } else {
      container.style.display = 'none';
    }
  };

  function confirmarClassificacaoCrime(mandado) {
    var cat = document.getElementById('selectClassificarCat').value;
    var novasKw = document.getElementById('inputNovasKeywords').value.trim();
    var addKw = document.getElementById('checkAddKeyword').checked;

    if (!cat) {
      chamarAlertaTatico('ERRO', 'Selecione uma nomeclatura ou crie uma nova.', 'OK');
      return;
    }

    if (cat === 'NOVA_NOMECLATURA') {
      // Lógica para criar nova lei/nomenclatura
      var novoNome = document.getElementById('inputNovaLeiNome').value.trim();
      var novoPino = document.getElementById('inputNovaLeiPino').value.trim();
      var novaCor = document.getElementById('inputNovaLeiCor').value;
      
      if (!novoNome) {
        chamarAlertaTatico('ERRO', 'Digite o nome da nova nomeclatura.', 'OK');
        return;
      }
      
      // Salvar a nova lei no banco, e já passa as palavras chave junto!
      var dadosNovaLei = {
        id: 0,
        categoria: novoNome,
        palavrasChave: addKw ? novasKw : '',
        cor: novaCor,
        svgPath: '',
        ordem: 99,
        ativo: true,
        pinoTexto: novoPino || novoNome.substring(0, 5)
      };

      google.script.run.withSuccessHandler(function(r) {
        if (r && r.sucesso) {
          atualizarCacheERenderizar('Nomeclatura "' + novoNome + '" criada com sucesso!');
        } else {
          chamarAlertaTatico('ERRO', r ? r.mensagem : 'Erro ao salvar.', 'OK');
        }
      }).salvarLei(dadosNovaLei);
      
      fecharModalClassificarCrime();
      return;
    }

    // Lógica antiga (atualizar keywords de nomenclatura existente)
    if (addKw && novasKw) {
      google.script.run.withSuccessHandler(function(r) {
        if (r && r.sucesso) {
          atualizarCacheERenderizar('Crime classificado e keywords adicionadas à nomeclatura "' + cat + '"!');
        } else {
          chamarAlertaTatico('ERRO', r ? r.mensagem : 'Erro ao salvar.', 'OK');
        }
      }).adicionarPalavrasChaveLei(cat, novasKw);
    } else {
      chamarAlertaTatico('INFO', 'Nomeclatura selecionada: ' + cat + '. (Sem salvar novas palavras-chave)', 'OK');
    }

    fecharModalClassificarCrime();
  }

  function atualizarCacheERenderizar(msgSucesso) {
    google.script.run.withSuccessHandler(function(tabela) {
      window._tabelaLeis = tabela || [];
      // Re-renderizar tudo com a nova classificação do banco
      if (typeof renderizarTabelaMandados === 'function') renderizarTabelaMandados(dadosMandados);
      var comCoord = dadosMandados.filter(function(d) { return !d.semEndereco; });
      if (typeof renderizarPinos === 'function') renderizarPinos(comCoord);
      
      chamarAlertaTatico('SALVO', msgSucesso, 'OK');
    }).obterTabelaClassificacao();
  }

  // ================================================================
  // FILTROS TEMPORAIS NOS GRÁFICOS
  // ================================================================

  var _chartInstances = {};

  function atualizarGraficosComFiltro() {
    var filtro = document.getElementById('filtroTemporalGraficos');
    var dias = filtro ? filtro.value : 'TODOS';
    graficosDesenhados = false;

    // Destruir gráficos anteriores
    ['graficoLancamentos', 'graficoCapturas', 'graficoCrimes', 'graficoAreas'].forEach(function(id) {
      if (_chartInstances[id]) {
        _chartInstances[id].destroy();
        _chartInstances[id] = null;
      }
    });

    renderizarGraficosComFiltro(dias);
  }

  function renderizarGraficosComFiltro(diasFiltro) {
    if (!dadosMandados || dadosMandados.length === 0) return;

    var hoje = new Date();
    var dadosFiltrados = dadosMandados;

    if (diasFiltro !== 'TODOS') {
      var limDias = parseInt(diasFiltro) || 9999;
      dadosFiltrados = dadosMandados.filter(function(d) {
        if (!d.data) return false;
        var parts = d.data.split('/');
        if (parts.length !== 3) return false;
        var dataLanc = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
        var diff = (hoje - dataLanc) / (1000 * 60 * 60 * 24);
        return diff <= limDias;
      });
    }

    // Stats
    var total = dadosFiltrados.length;
    var capturados = dadosFiltrados.filter(function(d) { return d.status.toUpperCase() === 'CAPTURADO'; }).length;
    var vencendo = 0, vencido = 0;

    dadosFiltrados.forEach(function(d) {
      var dias = calcularDiasRestantes(d.validade);
      if (dias !== null) {
        if (dias <= 0) vencido++;
        else if (dias <= 30) vencendo++;
      }
    });

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statCaptura').textContent = capturados + ' (' + (total > 0 ? Math.round(capturados / total * 100) : 0) + '%)';
    document.getElementById('statVencendo').textContent = vencendo;
    document.getElementById('statVencido').textContent = vencido;

    // Config Chart.js
    Chart.defaults.color = '#9090a8';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
    Chart.defaults.font.family = 'Inter';

    // Gráfico de barras: Mandados por mês
    var meses = {};
    dadosFiltrados.forEach(function(d) {
      if (d.data) {
        var parts = d.data.split('/');
        if (parts.length === 3) {
          var chave = parts[1] + '/' + parts[2];
          meses[chave] = (meses[chave] || 0) + 1;
        }
      }
    });
    var mesLabels = Object.keys(meses).slice(-12);
    var mesData = mesLabels.map(function(k) { return meses[k]; });

    _chartInstances['graficoLancamentos'] = new Chart(document.getElementById('graficoLancamentos'), {
      type: 'bar',
      data: {
        labels: mesLabels,
        datasets: [{ label: 'Mandados Inseridos', data: mesData, backgroundColor: '#6c63ff', borderRadius: 6, borderSkipped: false }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    // Gráfico de capturas
    var mesesCaptura = {};
    dadosFiltrados.filter(function(d) { return d.status.toUpperCase() === 'CAPTURADO'; }).forEach(function(d) {
      if (d.data) {
        var parts = d.data.split('/');
        if (parts.length === 3) {
          var chave = parts[1] + '/' + parts[2];
          mesesCaptura[chave] = (mesesCaptura[chave] || 0) + 1;
        }
      }
    });
    var capLabels = Object.keys(mesesCaptura).slice(-12);
    var capData = capLabels.map(function(k) { return mesesCaptura[k]; });

    _chartInstances['graficoCapturas'] = new Chart(document.getElementById('graficoCapturas'), {
      type: 'line',
      data: {
        labels: capLabels.length > 0 ? capLabels : mesLabels,
        datasets: [{ label: 'Capturas', data: capData.length > 0 ? capData : mesLabels.map(function() { return 0; }), borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    // Gráfico de crimes (donut)
    var crimes = {};
    dadosFiltrados.forEach(function(d) {
      var tipo = classificarCrime ? classificarCrime(d.artigo || d.infoProcessuais || '').tipo : 'Outros';
      crimes[tipo] = (crimes[tipo] || 0) + 1;
    });
    var crimeLabels = Object.keys(crimes);
    var crimeData = crimeLabels.map(function(k) { return crimes[k]; });
    var crimeCores = ['#8b0000', '#dc2626', '#ea580c', '#7c3aed', '#991b1b', '#ca8a04', '#e11d48', '#b45309', '#2563eb', '#475569', '#6b7280'];

    _chartInstances['graficoCrimes'] = new Chart(document.getElementById('graficoCrimes'), {
      type: 'doughnut',
      data: {
        labels: crimeLabels,
        datasets: [{ data: crimeData, backgroundColor: crimeCores.slice(0, crimeLabels.length) }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 9 }, boxWidth: 10, padding: 6 } } } }
    });

    // Gráfico de áreas
    var areas = {};
    dadosFiltrados.forEach(function(d) {
      var area = d.bpmArea || d.batalhao || 'Sem Área';
      areas[area] = (areas[area] || 0) + 1;
    });
    var areaLabels = Object.keys(areas);
    var areaData = areaLabels.map(function(k) { return areas[k]; });

    _chartInstances['graficoAreas'] = new Chart(document.getElementById('graficoAreas'), {
      type: 'bar',
      data: {
        labels: areaLabels,
        datasets: [{ label: 'Por Área', data: areaData, backgroundColor: '#3b82f6', borderRadius: 6, borderSkipped: false }]
      },
      options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } }
    });

    graficosDesenhados = true;
  }

</script>
